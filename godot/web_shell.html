<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>$GODOT_PROJECT_NAME</title>
    <link rel="icon" type="image/png" href="index.icon.png">
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
    <link rel="stylesheet" href="./game-shell.css">
    $GODOT_HEAD_INCLUDE
  </head>
  <body>
    <main class="shell">
      <section class="shell__stage">
        <div class="game-frame">
          <audio
            id="ambient-audio"
            preload="metadata"
            loop
            playsinline
            src="/orchastra-cinematic-001.mp3"
          ></audio>

          <canvas id="canvas">
            Your browser does not support the canvas tag.
          </canvas>

          <noscript>
            Your browser does not support JavaScript.
          </noscript>

          <div id="status" data-mode="progress" role="status" aria-live="polite">
            <div class="status-shell">
              <div class="status-shell__sigil" aria-hidden="true">
                <span class="status-shell__sigil-core">CORE</span>
                <span class="status-shell__rune status-shell__rune--north">ᚲ</span>
                <span class="status-shell__rune status-shell__rune--east">ᛟ</span>
                <span class="status-shell__rune status-shell__rune--south">ᚱ</span>
                <span class="status-shell__rune status-shell__rune--west">ᛖ</span>
              </div>

              <div class="status-shell__copy">
                <p class="eyebrow">CoreSapian Temple</p>
                <h2 id="status-title">Opening the Temple</h2>
                <p id="status-detail" class="status-shell__detail">Preparing the entry sequence.</p>
              </div>

              <div class="status-shell__meter" aria-hidden="true">
                <div id="status-meter-fill" class="status-shell__meter-fill"></div>
              </div>

              <progress id="status-progress" value="0" max="100">0%</progress>
              <p id="status-progress-label" class="status-shell__progress-label">SYNC</p>
              <div id="status-notice"></div>
            </div>
          </div>

          <div id="immersive-toolbar" class="shell__toolbar" aria-label="Scene controls">
            <div class="shell__toolbar-pill">
              <button id="sound-toggle" class="shell__button" type="button" aria-pressed="true">Sound</button>
              <button id="fullscreen-toggle" class="shell__button" type="button">Fullscreen</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="rotate-gate" class="rotate-gate" hidden>
      <div class="rotate-gate__card">
        <p class="eyebrow">Landscape Required</p>
        <h2>Rotate your device</h2>
        <p>This version is designed for widescreen play. Turn your phone sideways, then tap below.</p>
        <button id="rotate-launch" class="shell__button" type="button">Rotate And Enter</button>
      </div>
    </div>

    <script src="$GODOT_URL"></script>
    <script>
      window.__GODOT_CONFIG = $GODOT_CONFIG;
    </script>
    <script type="module" src="./game-shell.js"></script>
  </body>
</html>
