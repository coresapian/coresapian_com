<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Coresapian - Puzzle Core Ocean</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			body {
				margin: 0;
				background-color: #000;
				color: #fff;
				font-family: Monospace;
				font-size: 13px;
				line-height: 24px;
				overscroll-behavior: none;
			}

			a {
				color: #ff0;
				text-decoration: none;
			}

			a:hover {
				text-decoration: underline;
			}

			#container {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
			}

			#info {
				position: absolute;
				top: 0px;
				width: 100%;
				padding: 10px;
				box-sizing: border-box;
				text-align: center;
				z-index: 1;
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div id="container"></div>
		<div id="info">
			coresapian.com
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { Water } from 'three/addons/objects/Water.js';
			import { Sky } from 'three/addons/objects/Sky.js';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

			let container;
			let camera, scene, renderer;
			let controls, water, sun;
			let puzzleCore; // Reference to our loaded model

			init();

			function init() {
				container = document.getElementById('container');

				// Renderer
				renderer = new THREE.WebGLRenderer();
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);
				renderer.setAnimationLoop(animate);
				renderer.toneMapping = THREE.ACESFilmicToneMapping;
				renderer.toneMappingExposure = 0.5;
				container.appendChild(renderer.domElement);

				// Scene
				scene = new THREE.Scene();

				// Camera
				camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
				camera.position.set(30, 30, 100);

				// Sun position vector
				sun = new THREE.Vector3();

				// Water
				const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
				water = new Water(
					waterGeometry,
					{
						textureWidth: 512,
						textureHeight: 512,
						waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', function (texture) {
							texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
						}),
						sunDirection: new THREE.Vector3(),
						sunColor: 0xffffff,
						waterColor: 0x001e0f,
						distortionScale: 3.7,
						fog: scene.fog !== undefined
					}
				);
				water.rotation.x = -Math.PI / 2;
				scene.add(water);

				// Skybox
				const sky = new Sky();
				sky.scale.setScalar(10000);
				scene.add(sky);

				const skyUniforms = sky.material.uniforms;
				skyUniforms['turbidity'].value = 10;
				skyUniforms['rayleigh'].value = 2;
				skyUniforms['mieCoefficient'].value = 0.005;
				skyUniforms['mieDirectionalG'].value = 0.8;

				// Fixed sun position parameters (no GUI)
				const parameters = {
					elevation: 2,
					azimuth: 180
				};

				const pmremGenerator = new THREE.PMREMGenerator(renderer);
				const sceneEnv = new THREE.Scene();
				let renderTarget;

				// Update sun position
				function updateSun() {
					const phi = THREE.MathUtils.degToRad(90 - parameters.elevation);
					const theta = THREE.MathUtils.degToRad(parameters.azimuth);

					sun.setFromSphericalCoords(1, phi, theta);

					sky.material.uniforms['sunPosition'].value.copy(sun);
					water.material.uniforms['sunDirection'].value.copy(sun).normalize();

					if (renderTarget !== undefined) renderTarget.dispose();

					sceneEnv.add(sky);
					renderTarget = pmremGenerator.fromScene(sceneEnv);
					scene.add(sky);
					scene.environment = renderTarget.texture;
				}

				updateSun();

				// Load the puzzle_core.glb model
				const loader = new GLTFLoader();
				loader.load(
					'/public/puzzle_core.glb',
					function (gltf) {
						puzzleCore = gltf.scene;
						
						// Scale and position the model appropriately
						puzzleCore.scale.set(5, 5, 5);
						puzzleCore.position.set(0, 5, 0);
						
						// Add to scene
						scene.add(puzzleCore);
					},
					function (xhr) {
						console.log((xhr.loaded / xhr.total * 100) + '% loaded');
					},
					function (error) {
						console.error('An error happened loading the model:', error);
						
						// Fallback if model fails to load - create a simple geometry
						const geometry = new THREE.IcosahedronGeometry(10, 2);
						const material = new THREE.MeshStandardMaterial({ 
							color: 0x00ffff,
							roughness: 0.2,
							metalness: 0.8
						});
						puzzleCore = new THREE.Mesh(geometry, material);
						puzzleCore.position.set(0, 5, 0);
						scene.add(puzzleCore);
					}
				);

				// Orbit controls - functionality kept but GUI removed
				controls = new OrbitControls(camera, renderer.domElement);
				controls.maxPolarAngle = Math.PI * 0.495;
				controls.target.set(0, 10, 0);
				controls.minDistance = 40.0;
				controls.maxDistance = 200.0;
				controls.update();

				// Handle window resize
				window.addEventListener('resize', onWindowResize);
			}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
			}

			function animate() {
				render();
			}

			function render() {
				const time = performance.now() * 0.001;

				// Animate the model if it's loaded
				if (puzzleCore) {
					// Floating animation similar to the original cube
					puzzleCore.position.y = Math.sin(time) * 20 + 5;
					
					// Gentle rotation
					puzzleCore.rotation.x = time * 0.5;
					puzzleCore.rotation.z = time * 0.51;
				}

				// Update water animation
				water.material.uniforms['time'].value += 1.0 / 60.0;

				renderer.render(scene, camera);
			}
		</script>
	</body>
</html>
