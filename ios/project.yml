name: CoreSapian

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

packages:
  SwiftGodotKit:
    url: https://github.com/migueldeicaza/SwiftGodotKit
    revision: b456f73fcd988ada9515f2687e4637744189251e
  SwiftGodot:
    url: https://github.com/migueldeicaza/SwiftGodot
    revision: 48112dd50fffe01f0af78e445a16991ecdc6bc94

targets:
  CoreSapian:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CoreSapian
    info:
      path: CoreSapian/Info.plist
      properties:
        CFBundleDisplayName: CoreSapian
        UIRequiresFullScreen: true
        UIApplicationSupportsIndirectInputEvents: true
        UIViewControllerBasedStatusBarAppearance: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coresapian.app
        PRODUCT_NAME: CoreSapian
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    dependencies:
      - package: SwiftGodotKit
        product: SwiftGodotKit
      - package: SwiftGodot
        product: SwiftGodot
    preBuildScripts:
      - name: Export Godot Pack
        shell: /bin/bash
        basedOnDependencyAnalysis: false
        showEnvVars: false
        inputFiles:
          - $(SRCROOT)/../godot/project.godot
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/main.pck
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:${PATH}"
          "${SRCROOT}/../godot/export_to_ios.sh"
          PACK_PATH="${SRCROOT}/main.pck"
          if [ ! -f "${PACK_PATH}" ]; then
            echo "error: main.pck was not generated at ${PACK_PATH}"
            exit 1
          fi
          DEST_DIR="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${DEST_DIR}"
          cp -f "${PACK_PATH}" "${DEST_DIR}/main.pck"
