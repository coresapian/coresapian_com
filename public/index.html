<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Coresapian - Puzzle Core Ocean</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<style>
			/* 
 * Styles for the body element of the webpage.
 * 
 * This sets the overall appearance and layout of the body, including:
 * - margin: Removes default margin around the body.
 * - background-color: Sets the background color to black.
 * - color: Sets the text color to white for contrast.
 * - font-family: Uses a monospace font for a consistent character width.
 * - font-size: Sets the base font size to 13 pixels.
 * - line-height: Sets the height of each line of text to 24 pixels for readability.
 * - overscroll-behavior: Prevents scrolling behavior from affecting the body.
 */
body {
    margin: 0;
    background-color: #000;
    color: #fff;
    font-family: Monospace;
    font-size: 13px;
    line-height: 24px;
    overscroll-behavior: none;
}

			a {
				color: #ff0;
				text-decoration: none;
			}

			a:hover {
				text-decoration: underline;
			}

			#container {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
			}

			#info {
				position: absolute;
				top: 0px;
				width: 100%;
				padding: 10px;
				box-sizing: border-box;
				text-align: center;
				z-index: 1;
				pointer-events: none;
			}
		</style>
	</head>
	<body>
		<div id="container"></div>
		<div id="info">
			coresapian.com
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { Water } from 'three/addons/objects/Water.js';
			import { Sky } from 'three/addons/objects/Sky.js';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
			import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
			import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
			import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
			import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
			// WaterCaustics import removed

			let container;
			let camera, scene, renderer, composer;
			let controls, water, sun;
			let puzzleCore; // Reference to our loaded model

			init();

			/**
 * Initializes the 3D scene: sets up renderer, scene, camera, water surface,
 * skybox, lighting environment, loads the puzzle core model, orbit controls,
 * post-processing effects, and window resize handling.
 */
function init() {
    console.log('Init function started');

    // Get the DOM container for the renderer
    container = document.getElementById('container');

    /** Renderer setup
     * - Creates a WebGL renderer
     * - Matches pixel ratio & viewport size to the window
     * - Hooks into the animation loop
     * - Applies ACES Filmic tone mapping
     * - Appends the canvas element to the page
     */
    renderer = new THREE.WebGLRenderer({
        antialias: true,
        preserveDrawingBuffer: true
    });
    renderer.domElement.addEventListener('webglcontextlost', event => {
        console.error('WebGL context lost');
        event.preventDefault();
    }, false);

    // Add error checking after renderer creation
    if (!renderer.getContext()) {
        alert('WebGL not supported!');
        return;
    }

    console.log('Renderer created successfully');

    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setAnimationLoop(animate);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.5;
    container.appendChild(renderer.domElement);
    console.log('Renderer appended to DOM');

    /** Scene creation */
    scene = new THREE.Scene();
    console.log('Scene created');

    /** Camera setup
     * - 55° vertical field of view
     * - Aspect ratio matches window
     * - Near clipping at 1, far at 20 000 units
     * - Positioned at (30, 30, 100)
     */
    camera = new THREE.PerspectiveCamera(
        55,
        window.innerWidth / window.innerHeight,
        1,
        20000
    );
    camera.position.set(30, 30, 100);
    console.log('Camera set up at position: ' + camera.position.toArray().join(', '));

    /** Sun direction vector placeholder */
    sun = new THREE.Vector3();

    /** Water surface
     * - Large plane geometry (10 000 × 10 000 units)
     * - Uses Water shader with normal map, distortion, colors
     * - Rotated to lie horizontal and added to scene
     */
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    water = new Water(waterGeometry, {
        textureWidth: 1024,
        textureHeight: 1024,
        waterNormals: new THREE.TextureLoader().load(
            'https://threejs.org/examples/textures/waternormals.jpg', // Revert to working CDN texture
            texture => {
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(8, 8);
            },
            undefined,
            error => {
                console.error('Failed to load water normal map:', error);
                water.material.uniforms.causticsIntensity.value = 0.0;
            }
        ),
        sunDirection: sun.clone().normalize(),
        sunColor: 0xFFFFFF,
        waterColor: 0x0064B4,
        distortionScale: 8.0,
        fog: scene.fog !== undefined,
        causticsIntensity: 2.3,
        causticsScale: 1.8,
        causticsSpeed: 0.6,
        transparent: true,
        opacity: 0.9
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

        // Depth-based transparency (temporarily disabled)
    // water.material.onBeforeCompile = shader => {
    //     shader.uniforms.cameraPosition = water.material.uniforms.cameraPosition;
    //     shader.fragmentShader = shader.fragmentShader
    //         .replace('#include <fog_fragment>', 
    //             `gl_FragColor.a *= clamp(1.0 - distance(vWorldPosition.xz, cameraPosition.xz)/5000.0, 0.4, 1.0);
    //             #include <fog_fragment>`);
    // };

    
    // Skybox: use equirectangular texture
    const skyboxTextureLoader = new THREE.TextureLoader();
    skyboxTextureLoader.load(
        './M3_Sky_Dome_equirectangular-jpg_clear_blue_sky_bright_1478788763_455173.jpg',
        function(texture) {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            scene.background = texture;
            scene.environment = texture;
        },
        undefined,
        function(err) {
            console.error('Error loading skybox texture:', err);
        }
    );

    /** Load GLB model for the puzzle core */
    const loader = new GLTFLoader();
    loader.load(
        './puzzle_core.glb',
        (gltf) => {
            puzzleCore = gltf.scene;
            puzzleCore.scale.set(5, 5, 5);
            puzzleCore.position.set(0, 5, 0);
            scene.add(puzzleCore);
            console.log('Model loaded successfully');
        },
        (xhr) => {
            console.log((xhr.loaded / xhr.total * 100) + '% loaded');
        },
        (error) => {
            console.error('Error loading model:', error);
            // Fallback: create a glowing icosahedron
            const geometry = new THREE.IcosahedronGeometry(10, 2);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.2, metalness: 0.8 });
            puzzleCore = new THREE.Mesh(geometry, material);
            puzzleCore.position.set(0, 5, 0);
            scene.add(puzzleCore);
            console.log('Model load failed, using fallback icosahedron');
        }
    );

    /** OrbitControls: restrict vertical angle & zoom range, and target */
    controls = new OrbitControls(camera, renderer.domElement);
    controls.maxPolarAngle = Math.PI * 0.495;
    controls.target.set(0, 10, 0);
    controls.minDistance = 40.0;
    controls.maxDistance = 200.0;
    controls.update();

    /** Post-processing pipeline
     * - RenderPass: draws the scene
     * - UnrealBloomPass: adds glow with strength, radius & threshold
     * - OutputPass: final composite
     */
    composer = new EffectComposer(renderer);
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.5,   // strength
        0.4,   // radius
        0.85   // threshold
    );
    const outputPass = new OutputPass();

    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    composer.addPass(outputPass);

    /** Handle browser window resize */
    window.addEventListener('resize', onWindowResize);
}

			function onWindowResize() {
				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize(window.innerWidth, window.innerHeight);
			}

			/**
 * Animation loop entry point.
 *
 * This function is called on each animation frame to update the scene.
 * It invokes `render()` to draw the current state, and when used with
 * `requestAnimationFrame`, it creates a continuous rendering loop.
 *
 * @returns {void}
 */
/**
 * Initiates the animation process by calling the render function.
 * This function is typically called in a loop to create a smooth animation effect.
 */
function animate() {
    console.log('Animation frame running');
    render();
}

			function render() {
				const time = performance.now() * 0.001;

				// Animate the model if it's loaded
				if (puzzleCore) {
					// Gentle rotation
					puzzleCore.rotation.x = time * 0.5;
					puzzleCore.rotation.z = time * 0.51;
				}

				// Update water animation
				water.material.uniforms['time'].value += 1.0 / 60.0;

				composer.render();
			}
		</script>
	</body>
</html>
