			/**
 * Initializes the 3D scene: sets up renderer, scene, camera, water surface,
 * skybox, lighting environment, loads the puzzle core model, orbit controls,
 * post-processing effects, and window resize handling.
 */
function init() {
    console.log('Init function started');

    // Get the DOM container for the renderer
    container = document.getElementById('container');

    /** Renderer setup
     * - Creates a WebGL renderer
     * - Matches pixel ratio & viewport size to the window
     * - Hooks into the animation loop
     * - Applies ACES Filmic tone mapping
     * - Appends the canvas element to the page
     */
    renderer = new THREE.WebGLRenderer({
        antialias: true,
        preserveDrawingBuffer: true
    });
    renderer = new THREE.WebGLRenderer({
        antialias: false,  // Disable antialiasing for performance
        powerPreference: 'high-performance',
        stencil: false,
        depth: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false; // Disable shadows for performance
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.5;
    container.appendChild(renderer.domElement);
    
    renderer.domElement.addEventListener('webglcontextlost', event => {
        console.error('WebGL context lost');
        event.preventDefault();
    });


    scene = new THREE.Scene();
    console.log('Scene created');

    /** Camera with optimized frustum */
    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000); // Increased far plane for sky sphere
    camera.position.set(30, 30, 100);
    console.log('Camera set up at position: ' + camera.position.toArray().join(', '));

    // Set up post-processing for bloom
    const BLOOM_LAYER = 1;
    const bloomParams = {
        exposure: 1,
        bloomStrength: 0.1,
        bloomThreshold: 0,
        bloomRadius: 0.2
    };
    composer = new EffectComposer(renderer);
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), bloomParams.bloomStrength, bloomParams.bloomRadius, bloomParams.bloomThreshold);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // Only show one layer at a time for selective bloom
    camera.layers.set(0); // Default to base layer

    // Helper for selective bloom
    function setBloomLayer(object) {
        object.layers.enable(BLOOM_LAYER);
        if (object.children) {
            object.children.forEach(setBloomLayer);
        }
    }

    /** Sun direction vector placeholder */
    sun = new THREE.Vector3();

    /** Water surface
     * - Large plane geometry (10 000 × 10 000 units)
     * - Uses Water shader with normal map, distortion, colors
     * - Rotated to lie horizontal and added to scene
     */
    const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
    water = new Water(waterGeometry, {
        textureWidth: 1024,
        textureHeight: 1024,
        waterNormals: new THREE.TextureLoader().load(
            'https://threejs.org/examples/textures/waternormals.jpg', 
            texture => {
                texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                texture.repeat.set(8, 8);
            },
            undefined,
            error => {
                console.error('Failed to load water normal map:', error);
                water.material.uniforms.causticsIntensity.value = 0.0;
            }
        ),
        sunDirection: sun.clone().normalize(),
        sunColor: 0xFFFFFF,
        waterColor: 0x0064B4,
        distortionScale: 8.0,
        fog: scene.fog !== undefined,
        causticsIntensity: 2.3,
        causticsScale: 1.8,
        causticsSpeed: 0.6,
        transparent: true,
        opacity: 0.9
    });
    water.rotation.x = -Math.PI / 2;
    scene.add(water);

    /** Setup lighting */
    // Ambient light for overall scene brightness
    const ambientLight = new THREE.AmbientLight(0xffffff, 100.0); // Much brighter
    scene.add(ambientLight);

    // Main directional light
    const mainLight = new THREE.DirectionalLight(0xffffff, 50.0); // Much brighter
    mainLight.position.set(5, 5, 5);
    scene.add(mainLight);

    // Fill light from opposite direction
    const fillLight = new THREE.DirectionalLight(0xffffff, 50.0); // Much brighter
    fillLight.position.set(-5, 0, -5);
    scene.add(fillLight);

    /** Add noise sphere shader */
const noiseSphereShader = {
    vertexShader: `
        varying vec2 vUv;
        varying vec3 vPosition;
        void main() {
            vUv = uv;
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform float iTime;
        uniform vec2 iMouse;
        uniform vec2 iResolution;
        varying vec2 vUv;
        varying vec3 vPosition;

        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

        float snoise(vec3 v){ 
            const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
            const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);

            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 =   v - i + dot(i, C.xxx) ;

            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );

            vec3 x1 = x0 - i1 + 1.0 * C.xxx;
            vec3 x2 = x0 - i2 + 2.0 * C.xxx;
            vec3 x3 = x0 - 1. + 3.0 * C.xxx;

            i = mod(i, 289.0 ); 
            vec4 p = permute( permute( permute( 
                                i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                            + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                            + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));

            float n_ = 1.0/7.0;
            vec3  ns = n_ * D.wyz - D.xzx;

            vec4 j = p - 49.0 * floor(p * ns.z *ns.z);

            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );

            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);

            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );

            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));

            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;

            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);

            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x;
            p1 *= norm.y;
            p2 *= norm.z;
            p3 *= norm.w;

            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), 
                                                                        dot(p2,x2), dot(p3,x3) ) );
        }

        float fbm( vec3 p ) {
            float f = 0.0;
            f += 0.5000*snoise( p ); p = p*2.02;
            f += 0.2500*snoise( p ); p = p*2.03;
            f += 0.1250*snoise( p ); p = p*2.01;
            f += 0.0625*snoise( p );
            return f/0.9375;
        }

        void main() {
            // Use sphere position for noise input instead of UV
            vec3 pos = normalize(vPosition);
            float mouseRatio = 0.5; // Fixed value since we don't need mouse interaction
            float noise = 0.25 + fbm(vec3(pos * 12.0, iTime * 0.18));
            noise *= 0.25 + snoise(vec3(pos * 4.0, iTime * 0.15));
            gl_FragColor = vec4(1.0, 1.0, 1.0, noise);
        }
    `
};

// Create noise sphere
const sphereGeometry = new THREE.SphereGeometry(10000, 64, 64);
const noiseMaterial = new THREE.ShaderMaterial({
    uniforms: {
        iTime: { value: 0 },
        iResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        iMouse: { value: new THREE.Vector2(0, 0) }
    },
    vertexShader: noiseSphereShader.vertexShader,
    fragmentShader: noiseSphereShader.fragmentShader.replace(
        /gl_FragColor = vec4\(1\.0, 1\.0, 1\.0, noise\);/, 
        'gl_FragColor = vec4(vec3(noise), 1.0);'
    ),
    transparent: false,
    depthWrite: false,
    depthTest: false,
    side: THREE.BackSide // Render on inside of sphere
});

const noiseSphere = new THREE.Mesh(sphereGeometry, noiseMaterial);
noiseSphere.renderOrder = -1;
scene.add(noiseSphere);

// GSAP animations for the noise sphere
gsap.to(noiseMaterial.uniforms.iMouse.value, {
    x: window.innerWidth,
    y: window.innerHeight,
    duration: 4,
    repeat: -1,
    yoyo: true,
    ease: "sine.inOut"
});

// Subtle scale animation
gsap.to(noiseSphere.scale, {
    x: 1.1,
    y: 1.1,
    z: 1.1,
    duration: 2,
    repeat: -1,
    yoyo: true,
    ease: "sine.inOut"
});

/** Add four orbiting sun meshes */
    const sunParams = [
        // color, emissive, size, y, z, orbitSpeed (radians/sec), initial angle
        { color: 0xFFFFCC, emissive: 0xFFFFAA, size: 25, y: 50, z: 2800, orbitSpeed: 0.04, angle: 0 }, // Largest, original
        { color: 0xFFA500, emissive: 0xFF8800, size: 20, y: 50, z: 2200, orbitSpeed: 0.08, angle: Math.PI / 2 }, // Medium-large
        { color: 0x00CCFF, emissive: 0x00AADD, size: 40, y: 40, z: 1500, orbitSpeed: 0.05, angle: Math.PI }, // Medium-small
        { color: 0xFF33CC, emissive: 0xFF33AA, size: 30, y: 30, z: 900, orbitSpeed: 0.07, angle: Math.PI * 1.5 }, // Smallest
    ];
    // Center of orbit (will be updated to abstractCore position if loaded)
    let orbitCenter = new THREE.Vector3(0, 5, 0);
    // Store sun meshes and their orbit data
    const suns = [];
    const lensflares = [];
    const glowSprites = [];
    const textureLoader = new THREE.TextureLoader();
    const flareTexture = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare0.png');
    const flareTexture2 = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare3.png');
    const glowTexture = textureLoader.load('https://threejs.org/examples/textures/sprites/glow.png');
    
    sunParams.forEach((param, i) => {
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: param.color,
            emissive: param.emissive,
            emissiveIntensity: 1,
        });
        const sunGeometry = new THREE.SphereGeometry(param.size, 32, 32);
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        // Calculate radius and initial angle from orbitCenter to initial (x,z)
        const dx = 200 - orbitCenter.x;
        const dz = param.z - orbitCenter.z;
        const radius = Math.sqrt(dx * dx + dz * dz);
        const initialAngle = Math.atan2(dz, dx);
        sunMesh.position.set(orbitCenter.x + radius * Math.cos(initialAngle), param.y, orbitCenter.z + radius * Math.sin(initialAngle));
        scene.add(sunMesh);
        suns.push({ mesh: sunMesh, radius, y: param.y, speed: param.orbitSpeed, angle: initialAngle, color: param.color });

        // Enable bloom layer for this sun
        setBloomLayer(sunMesh);

        // Lens flare for each sun
        const lensflare = new Lensflare();
        lensflare.addElement(new LensflareElement(flareTexture, 700, 0, param.color));
        lensflare.addElement(new LensflareElement(flareTexture2, 60, 0.6));
        lensflare.addElement(new LensflareElement(flareTexture2, 70, 0.7));
        lensflare.addElement(new LensflareElement(flareTexture2, 120, 0.9));
        lensflare.position.copy(sunMesh.position);
        scene.add(lensflare);
        lensflares.push(lensflare);

        // Glow sprite for each sun
        const glowMaterial = new THREE.SpriteMaterial({ map: glowTexture, color: param.color, transparent: true, opacity: 0.6 });
        const glowSprite = new THREE.Sprite(glowMaterial);
        glowSprite.scale.set(800, 800, 1);
        glowSprite.position.copy(sunMesh.position);
        scene.add(glowSprite);
        glowSprites.push(glowSprite);
    });

    // When the core model loads, update orbitCenter
    window.setSunOrbitCenter = (vec3) => {
        orbitCenter = vec3.clone ? vec3.clone() : new THREE.Vector3(vec3.x, vec3.y, vec3.z);
    };

    // Skybox GLB loader removed; using noiseSphere shader instead
    // The noiseSphere mesh created earlier serves as the skybox

    /** Load GLB model for the puzzle core */
    const loader = new GLTFLoader();
    loader.load(
        '/abstract_core.glb',
        (gltf) => {
            abstractCore = gltf.scene;
            abstractCore.scale.set(1, 1, 1);
            abstractCore.position.set(0, 5, 0);
            // Update sun orbit center to match core position
            if (window.setSunOrbitCenter) window.setSunOrbitCenter(abstractCore.position);


            // Log all mesh names and their material colors to help identify the core mesh
            abstractCore.traverse((child) => {
                if (child.isMesh) {
                    console.log('Mesh name:', child.name);
                    if (child.material && child.material.color) {
                        console.log('  Color:', child.material.color.getHexString());
                    }
                }
            });

            // Add a sprite-based glow to the Sphere_Core_0 mesh
            let coreMesh = null;
            abstractCore.traverse((child) => {
                if (child.isMesh && child.name === "Sphere_Core_0") {
                    coreMesh = child;
                }
            });
            if (coreMesh) {
                const textureLoader = new THREE.TextureLoader();
                const glowTexture = textureLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/sprites/glow.png');
                const glowMaterial = new THREE.SpriteMaterial({
                    map: glowTexture,
                    color: 0x00ffff, // Cyan glow
                    transparent: true,
                    opacity: 1.0 // Max brightness
                });
                const glowSprite = new THREE.Sprite(glowMaterial);
                glowSprite.scale.set(16, 16, 1); // Much larger and brighter
                glowSprite.position.set(0, 0, 0); // Centered on the core mesh
                coreMesh.add(glowSprite);
            }
    
    // Set up materials for glowing effect
    abstractCore.traverse((child) => {
        if (child.isMesh) {
            // Store original material
            child.originalMaterial = child.material;
            // Create new material with original properties
            child.material = child.material.clone();
        }
    });
    
    // Set up animation mixer and state
    if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(abstractCore);
        
        // Store animation data
        window.animationState = {
            actions: [],
            isForward: true,
            isPaused: false,
            pauseStartTime: 0,
            pauseDuration: 5, // seconds to pause at end
            timeScale: 1.0,
            easingDuration: 1.0, // seconds to ease in/out
            // Random rotation parameters
            rotation: {
                speed: 0.1,  // Base rotation speed
                noiseOffset: {
                    x: Math.random() * 1000,
                    y: Math.random() * 1000,
                    z: Math.random() * 1000
                }
            }
        };
        
        // Simple noise function (since we don't have access to Perlin noise)
        window.smoothNoise = (x) => {
            return Math.sin(x/10) * 0.5 + 
                   Math.sin(x/15) * 0.25 + 
                   Math.sin(x/20) * 0.125;
        };

        gltf.animations.forEach((clip) => {
            const action = mixer.clipAction(clip);
            action.clampWhenFinished = true;
            action.loop = THREE.LoopOnce;
            window.animationState.actions.push(action);
        });

        // Start playing forward
        window.animationState.actions.forEach(action => {
            action.reset();
            action.play();
        });
    }
    
    // Add the model to the scene
    scene.add(abstractCore);
    console.log('Model loaded successfully');
},
        (xhr) => {
            console.log((xhr.loaded / xhr.total * 100) + '% loaded');
        },
        (error) => {
            console.error('Error loading model:', error);
            // Fallback: create a glowing icosahedron
            const geometry = new THREE.IcosahedronGeometry(10, 2);
            const material = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.2, metalness: 0.8 });
            abstractCore = new THREE.Mesh(geometry, material);
            abstractCore.position.set(0, 5, 0);
            scene.add(abstractCore);
            console.log('Model load failed, using fallback icosahedron');
        }
    );

    /** OrbitControls: restrict vertical angle & zoom range, and target */
    controls = new OrbitControls(camera, renderer.domElement);
    controls.maxPolarAngle = Math.PI * 0.495;
    controls.target.set(0, 10, 0);
    controls.minDistance = 250.0;
    controls.maxDistance = 1000.0;
    controls.update();

    /** Animation loop */
    let clock = new THREE.Clock();
    // Store mixer for animations
    let mixer;
    let frameCount = 0; // For frame skipping

    function animate() {
    // Update noise sphere shader time
    noiseMaterial.uniforms.iTime.value = clock.getElapsedTime();
        requestAnimationFrame(animate);
        
        // Update animations
        const delta = clock.getDelta();
        if (mixer && window.animationState) {
            const state = window.animationState;
            const actions = state.actions;
            
            if (actions.length > 0) {
                const action = actions[0]; // Use first animation as reference
                const time = action.time;
                const duration = action._clip.duration;
                
                if (!state.isPaused) {
                    // Calculate how close we are to the end (0 = start, 1 = end)
                    const progress = state.isForward ? time / duration : 1 - (time / duration);
                    
                    // Apply easing when near the end
                    if (progress > (duration - state.easingDuration) / duration) {
                        const easeProgress = (progress - ((duration - state.easingDuration) / duration)) / (state.easingDuration / duration);
                        state.timeScale = 1.0 - (easeProgress * 0.9); // Slow down to 10% speed
                    } else {
                        state.timeScale = 1.0;
                    }
                    
                    // Check if animation reached end
                    if (state.isForward && time >= duration - 0.001 || 
                        !state.isForward && time <= 0.001) {
                        state.isPaused = true;
                        state.pauseStartTime = clock.getElapsedTime();
                    }
                    
                    // Apply timeScale to all actions
                    actions.forEach(a => a.timeScale = state.isForward ? state.timeScale : -state.timeScale);
                    mixer.update(delta);
                } else {
                    // Handle pause and reverse
                    const pauseElapsed = clock.getElapsedTime() - state.pauseStartTime;
                    if (pauseElapsed >= state.pauseDuration) {
                        state.isPaused = false;
                        state.isForward = !state.isForward;
                        state.timeScale = 1.0;
                        
                        // Reset and restart animations in new direction
                        actions.forEach(action => {
                            action.timeScale = state.isForward ? 1 : -1;
                            if (state.isForward) {
                                action.reset();
                                action.play();
                            }
                        });
                    }
                }
            }
        }
        
        // Update abstract core animation
        if (abstractCore) {
            const time = clock.getElapsedTime();
            
            // Smooth random rotation
            abstractCore.rotation.x = Math.sin(time * 0.5) * 0.2;
            abstractCore.rotation.y = Math.cos(time * 0.3) * 0.3;
            abstractCore.rotation.z = Math.sin(time * 0.4) * 0.1;
            
            // Add some gentle floating motion
            abstractCore.position.y = 5 + Math.sin(time * 0.8) * 0.5;
        }
        
        // Update sun orbits
        if (suns && suns.length > 0) {
            const t = clock.getElapsedTime();
            suns.forEach((sun, i) => {
                // Update angle based on speed
                sun.angle += sun.speed;
                
                // Calculate new position
                const x = orbitCenter.x + sun.radius * Math.cos(sun.angle);
                const z = orbitCenter.z + sun.radius * Math.sin(sun.angle);
                
                // Update sun position
                sun.mesh.position.set(x, sun.y, z);
                
                // Update associated lensflare and glow sprite
                sun.mesh.position.y = sun.y + orbitCenter.y - 5; // adjust for core's Y
                // Update lensflare and glow position
                if (lensflares[i]) lensflares[i].position.copy(sun.mesh.position);
                if (glowSprites[i]) glowSprites[i].position.copy(sun.mesh.position);
            });
        }
        // --- Selective Bloom Render ---
        // 1. Render bloom pass (only glowing objects)
        camera.layers.set(BLOOM_LAYER);
        composer.render();

        // 2. Render the rest of the scene (non-bloom objects, no bloom)
        camera.layers.set(0);
        renderer.autoClear = false;
        renderer.clearDepth(); // Clear depth so both layers show up
        renderer.render(scene, camera);
        renderer.autoClear = true;
    }
    animate();

    let resizeTimeout;
    window.addEventListener('resize', function () {
        if (resizeTimeout) clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, 250); 
    });
} 

		</script>
	</body>
