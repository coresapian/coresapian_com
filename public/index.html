            position: fixed;

        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",

        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Water } from 'three/addons/objects/Water.js';
        import { Sky } from 'three/addons/objects/Sky.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        let container, camera, scene, renderer, controls;
        let water, sky, coreModel;
        let suns = [], lensflares = [], glowSprites = [];
        let orbitCenter = new THREE.Vector3(0, 5, 0);
        const SUN_PARAMS = [
            { color: 0xFFFFCC, emissive: 0xFFFFAA, size: 25, y: 50, z: 2800, orbitSpeed: 0.04, angle: 0 },
            { color: 0xFFA500, emissive: 0xFF8800, size: 20, y: 50, z: 2200, orbitSpeed: 0.08, angle: Math.PI / 2 },
            { color: 0x00CCFF, emissive: 0x00AADD, size: 40, y: 40, z: 1500, orbitSpeed: 0.05, angle: Math.PI },
            { color: 0xFF33CC, emissive: 0xFF33AA, size: 30, y: 30, z: 900, orbitSpeed: 0.07, angle: Math.PI * 1.5 },
        ];
        const GLOW_SPRITE_SCALE = 800;
        const GLOW_OPACITY = 0.6;
        let clock = new THREE.Clock();

        // Asset loading state
        let assetsToLoad = 1 + 3 + 3; // coreModel (GLB), 3 textures for water, 3 for suns
        let assetsLoaded = 0;
        function updateLoadingProgress() {
            assetsLoaded++;
            const progress = Math.min(assetsLoaded / assetsToLoad, 1);
            document.getElementById('progress-bar').style.width = `${progress * 100}%`;
            if (progress === 1) {
                setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('fade-out');
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                    }, 900);
                }, 300);
            }
        }

        init();
        animate();

        function init() {
            container = document.getElementById('container');
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.5;
            container.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 1, 20000);
            camera.position.set(30, 30, 100);

            // Water
            const waterGeometry = new THREE.PlaneGeometry(10000, 10000);
            water = new Water(
                waterGeometry,
                {
                    textureWidth: 512,
                    textureHeight: 512,
                    waterNormals: new THREE.TextureLoader().load('https://threejs.org/examples/textures/waternormals.jpg', function (texture) {
                        texture.wrapS = texture.wrapT = THREE.RepeatWrapping;
                        updateLoadingProgress();
                    }),
                    sunDirection: new THREE.Vector3(),
                    sunColor: 0xffffff,
                    waterColor: 0x001e0f,
                    distortionScale: 3.7,
                    fog: scene.fog !== undefined
                }
            );
            water.rotation.x = -Math.PI / 2;
            scene.add(water);

            // Sky
            sky = new Sky();
            sky.scale.setScalar(10000);
            scene.add(sky);
            const skyUniforms = sky.material.uniforms;
            skyUniforms['turbidity'].value = 10;
            skyUniforms['rayleigh'].value = 2;
            skyUniforms['mieCoefficient'].value = 0.005;
            skyUniforms['mieDirectionalG'].value = 0.8;

            // Sun position for sky and water
            const parameters = { elevation: 2, azimuth: 180 };
            const sun = new THREE.Vector3();
            function updateSun() {
                const phi = THREE.MathUtils.degToRad(90 - parameters.elevation);
                const theta = THREE.MathUtils.degToRad(parameters.azimuth);
                sun.setFromSphericalCoords(1, phi, theta);
                sky.material.uniforms['sunPosition'].value.copy(sun);
                water.material.uniforms['sunDirection'].value.copy(sun).normalize();
            }
            updateSun();

            // Load abstract core model
            const loader = new GLTFLoader();
            loader.load('abstract_core.glb', function(gltf) {
                coreModel = gltf.scene;
                coreModel.position.set(0, 5, 0);
                coreModel.scale.set(10, 10, 10);
                scene.add(coreModel);
                updateLoadingProgress();
            }, undefined, function(error) {
                console.error('Error loading abstract_core.glb:', error);
                updateLoadingProgress();
            });

            // Orbiting suns
            const textureLoader = new THREE.TextureLoader();
            const flareTexture = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare0.png', updateLoadingProgress);
            const flareTexture2 = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare3.png', updateLoadingProgress);
            const glowTexture = textureLoader.load('https://threejs.org/examples/textures/sprites/glow.png', updateLoadingProgress);
            SUN_PARAMS.forEach((param, i) => {
                const sunMaterial = new THREE.MeshBasicMaterial({ color: param.color, emissive: param.emissive, emissiveIntensity: 1 });
                const sunGeometry = new THREE.SphereGeometry(param.size, 32, 32);
                const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
                // Orbit radius and angle
                const dx = 200 - orbitCenter.x;
                const dz = param.z - orbitCenter.z;
                const radius = Math.sqrt(dx * dx + dz * dz);
                const initialAngle = Math.atan2(dz, dx);
                sunMesh.position.set(orbitCenter.x + radius * Math.cos(initialAngle), param.y, orbitCenter.z + radius * Math.sin(initialAngle));
                scene.add(sunMesh);
                suns.push({ mesh: sunMesh, radius, y: param.y, speed: param.orbitSpeed, angle: initialAngle, color: param.color });
                // Lensflare
                const lensflare = new THREE.Group();
                const flareSprite1 = new THREE.Sprite(new THREE.SpriteMaterial({ map: flareTexture, color: param.color, transparent: true, opacity: 0.6 }));
                flareSprite1.scale.set(120, 120, 1);
                lensflare.add(flareSprite1);
                const flareSprite2 = new THREE.Sprite(new THREE.SpriteMaterial({ map: flareTexture2, color: param.color, transparent: true, opacity: 0.4 }));
                flareSprite2.scale.set(60, 60, 1);
                lensflare.add(flareSprite2);
                lensflare.position.copy(sunMesh.position);
                scene.add(lensflare);
                lensflares.push(lensflare);
                // Glow sprite
                const glowMaterial = new THREE.SpriteMaterial({ map: glowTexture, color: param.color, transparent: true, opacity: GLOW_OPACITY });
                const glowSprite = new THREE.Sprite(glowMaterial);
                glowSprite.scale.set(GLOW_SPRITE_SCALE, GLOW_SPRITE_SCALE, 1);
                glowSprite.position.copy(sunMesh.position);
                scene.add(glowSprite);
                glowSprites.push(glowSprite);
            });

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.maxPolarAngle = Math.PI * 0.495;
            controls.target.set(0, 10, 0);
            controls.minDistance = 40.0;
            controls.maxDistance = 200.0;
            controls.update();

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            // Animate core
            if (coreModel) {
                coreModel.rotation.x = Math.sin(time * 0.5) * 0.2;
                coreModel.rotation.y = Math.cos(time * 0.3) * 0.3;
                coreModel.rotation.z = Math.sin(time * 0.4) * 0.1;
                coreModel.position.y = 5 + Math.sin(time * 0.8) * 0.5;
            }
            // Animate suns
            suns.forEach((sun, i) => {
                sun.angle += sun.speed;
                const x = orbitCenter.x + sun.radius * Math.cos(sun.angle);
                const z = orbitCenter.z + sun.radius * Math.sin(sun.angle);
                sun.mesh.position.set(x, sun.y, z);
                if (lensflares[i]) lensflares[i].position.copy(sun.mesh.position);
                if (glowSprites[i]) glowSprites[i].position.copy(sun.mesh.position);
            });
            // Animate water
            if (water) water.material.uniforms['time'].value += 1.0 / 60.0;
            renderer.render(scene, camera);
        }
    </script>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { Water } from 'three/addons/objects/Water.js';
import { Sky } from 'three/addons/objects/Sky.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { Lensflare, LensflareElement } from 'three/addons/objects/Lensflare.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// === CONSTANTS ===
const CAMERA_FOV = 55;
const CAMERA_NEAR = 1;
const CAMERA_FAR = 10000;
const CAMERA_START_POS = { x: 30, y: 30, z: 100 };
const BLOOM_LAYER = 1;
const BLOOM_PARAMS = { exposure: 1, bloomStrength: 0.1, bloomThreshold: 0, bloomRadius: 0.2 };
const WATER_SIZE = 10000;
const WATER_TEXTURE_SIZE = 1024;
const WATER_COLOR = 0x0064B4;
const WATER_DISTORTION = 8.0;
const WATER_OPACITY = 0.8;
const WATER_CAUSTICS_INTENSITY = 2.3;
const WATER_CAUSTICS_SCALE = 1.8;
const WATER_CAUSTICS_SPEED = 0.2;
const ORBIT_CONTROLS = {
    maxPolarAngle: Math.PI * 0.495,
    target: { x: 0, y: 10, z: 0 },
    minDistance: 250.0,
    maxDistance: 1000.0
};
const SUN_PARAMS = [
    { color: 0xFFFFCC, emissive: 0xFFFFAA, size: 25, y: 50, z: 2800, orbitSpeed: 0.04, angle: 0 },
    { color: 0xFFA500, emissive: 0xFF8800, size: 20, y: 50, z: 2200, orbitSpeed: 0.08, angle: Math.PI / 2 },
    { color: 0x00CCFF, emissive: 0x00AADD, size: 40, y: 40, z: 1500, orbitSpeed: 0.05, angle: Math.PI },
    { color: 0xFF33CC, emissive: 0xFF33AA, size: 30, y: 30, z: 900, orbitSpeed: 0.07, angle: Math.PI * 1.5 },
];
const GLOW_SPRITE_SCALE = 800;
const GLOW_OPACITY = 0.6;
const CORE_START_POS = { x: 0, y: 5, z: 0 };
const CORE_FALLBACK_COLOR = 0x00ffff;
const CORE_FALLBACK_SIZE = 10;
const CORE_FALLBACK_DETAIL = 2;
const ANIMATION_PAUSE_DURATION = 5;
const ANIMATION_EASING_DURATION = 1.0;
const ANIMATION_ROTATION_SPEED = 0.1;


// === GLOBALS ===
let container, camera, scene, renderer, composer;
let controls, water, sun, abstractCore, mixer;
let orbitCenter = new THREE.Vector3(CORE_START_POS.x, CORE_START_POS.y, CORE_START_POS.z);
let suns = [], lensflares = [], glowSprites = [];
let clock = new THREE.Clock();
let loadingManager;

// === LOADING MANAGER & PROGRESS ===
/**
 * Update the loading progress bar and hide loading screen when done
 */
function updateLoadingProgress(itemsLoaded, itemsTotal) {
    updateLoadingProgressBar(itemsLoaded, itemsTotal);
    if (itemsLoaded === itemsTotal) {
        hideLoadingScreen();
    }
}

/**
 * Update the progress bar width
 */
function updateLoadingProgressBar(itemsLoaded, itemsTotal) {
    const progress = (itemsLoaded / itemsTotal) * 100;
    document.getElementById('progress-bar').style.width = `${progress}%`;
}

/**
 * GSAP fade out the loading screen
 */
function hideLoadingScreen() {
    const loadingScreen = document.getElementById('loading-screen');
    gsap.to(loadingScreen, {
        opacity: 0,
        duration: 1,
        onComplete: () => {
            loadingScreen.style.display = 'none';
        }
    });
}

function createLoadingManager() {
    return new THREE.LoadingManager(
        () => updateLoadingProgress(1, 1),
        (url, itemsLoaded, itemsTotal) => updateLoadingProgress(itemsLoaded, itemsTotal),
        (err) => {
            console.error('Asset loading error:', err);
        }
    );
}

// === MAIN INITIALIZATION ===
init();

/**
 * Initializes the 3D scene: sets up renderer, scene, camera, water surface,
 * skybox, lighting environment, loads the puzzle core model, orbit controls,
 * post-processing effects, and window resize handling.
 */
function init() {
    console.log('Init function started');
    container = document.getElementById('container');
    initRenderer(); // Set up the WebGL renderer and attach to DOM
    scene = initScene(); // Create and return the Three.js scene
    camera = initCamera(); // Set up the camera with position and aspect
    composer = initPostProcessing(renderer, scene, camera); // Set up post-processing (bloom, etc)
    sun = new THREE.Vector3();
    water = initWater(scene, sun); // Add water surface
    initLighting(scene); // Add ambient and directional lights
    controls = initControls(camera, renderer.domElement); // Set up orbit controls
    createStarfield(scene); // Add procedural starfield skybox
    initSuns(scene); // Add orbiting suns, lensflares, and glow sprites
    abstractCore = initCoreModel(scene); // Load core model
    initAssetLoading(); // Set up asset loading manager and progress
    initEventListeners(); // Set up window event listeners
    startAnimationLoop(); // Start animation loop
}

/**
 * Set up window event listeners (resize, etc)
 */
function initEventListeners() {
    let resizeTimeout;
    window.addEventListener('resize', function () {
        if (resizeTimeout) clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }, 250);
    });
}

/**
 * Set up asset loading manager and progress bar
 */
function initAssetLoading() {
    loadingManager = new THREE.LoadingManager(
        () => updateLoadingProgress(1, 1),
        (url, itemsLoaded, itemsTotal) => updateLoadingProgress(itemsLoaded, itemsTotal),
        (err) => {
            console.error('Asset loading error:', err);
        }
    );
}


/**
 * Add orbiting suns, lensflares, and glow sprites to the scene
 */
function initSuns(scene) {
    // Center of orbit (will be updated to abstractCore position if loaded)
    orbitCenter = new THREE.Vector3(0, 5, 0);
    suns = [];
    lensflares = [];
    glowSprites = [];
    const textureLoader = new THREE.TextureLoader();
    const flareTexture = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare0.png');
    const flareTexture2 = textureLoader.load('https://threejs.org/examples/textures/lensflare/lensflare3.png');
    const glowTexture = textureLoader.load('https://threejs.org/examples/textures/sprites/glow.png');
    SUN_PARAMS.forEach((param, i) => {
        const sunMaterial = new THREE.MeshBasicMaterial({
            color: param.color,
            emissive: param.emissive,
            emissiveIntensity: 1,
        });
        const sunGeometry = new THREE.SphereGeometry(param.size, 32, 32);
        const sunMesh = new THREE.Mesh(sunGeometry, sunMaterial);
        // Calculate radius and initial angle from orbitCenter to initial (x,z)
        const dx = 200 - orbitCenter.x;
        const dz = param.z - orbitCenter.z;
        const radius = Math.sqrt(dx * dx + dz * dz);
        const initialAngle = Math.atan2(dz, dx);
        sunMesh.position.set(
            orbitCenter.x + radius * Math.cos(param.angle),
            param.y,
            orbitCenter.z + radius * Math.sin(param.angle)
        );
        setBloomLayer(sunMesh);
        scene.add(sunMesh);
        suns.push({ mesh: sunMesh, angle: param.angle, speed: param.orbitSpeed, radius, y: param.y });
        // Lens flare for each sun
        const lensflare = new Lensflare();
        lensflare.addElement(new LensflareElement(flareTexture, 700, 0, param.color));
        lensflare.addElement(new LensflareElement(flareTexture2, 60, 0.6));
        lensflare.addElement(new LensflareElement(flareTexture2, 70, 0.7));
        lensflare.addElement(new LensflareElement(flareTexture2, 120, 0.9));
        lensflare.position.copy(sunMesh.position);
        scene.add(lensflare);
        lensflares.push(lensflare);
        // Glow sprite for each sun
        const glowMaterial = new THREE.SpriteMaterial({ map: glowTexture, color: param.color, transparent: true, opacity: GLOW_OPACITY });
        const glowSprite = new THREE.Sprite(glowMaterial);
        glowSprite.scale.set(GLOW_SPRITE_SCALE, GLOW_SPRITE_SCALE, 1);
        glowSprite.position.copy(sunMesh.position);
        scene.add(glowSprite);
        glowSprites.push(glowSprite);
    });
}

/**
 * Start the animation loop and update scene components
 */
function startAnimationLoop() {
    clock = new THREE.Clock();
    function animate() {
        // Update noise sphere shader time if present
        const noiseMaterial = getNoiseMaterial(scene);
        if (noiseMaterial) {
            noiseMaterial.uniforms.iTime.value = clock.getElapsedTime();
        }
        // Update core animation
        if (abstractCore) {
            const time = clock.getElapsedTime();
            abstractCore.rotation.x = Math.sin(time * 0.5) * 0.2;
            abstractCore.rotation.y = Math.cos(time * 0.3) * 0.3;
            abstractCore.rotation.z = Math.sin(time * 0.4) * 0.1;
            abstractCore.position.y = 5 + Math.sin(time * 0.8) * 0.5;
        }
        // Update sun orbits
        updateSunsOrbit();

        // Render passes
        camera.layers.set(BLOOM_LAYER);
        composer.render();
        camera.layers.set(0);
        renderer.autoClear = false;
        renderer.clearDepth();
        renderer.render(scene, camera);
        renderer.autoClear = true;
        requestAnimationFrame(animate);
    }
    animate();
}

/**
 * Update sun orbits, lensflares, and glow sprites each frame
 */
function updateSunsOrbit() {
    if (suns && suns.length > 0) {
        suns.forEach((sun, i) => {
            sun.angle += sun.speed;
            const x = orbitCenter.x + sun.radius * Math.cos(sun.angle);
            const z = orbitCenter.z + sun.radius * Math.sin(sun.angle);
            sun.mesh.position.set(x, sun.y, z);
            if (lensflares[i]) lensflares[i].position.copy(sun.mesh.position);
            if (glowSprites[i]) glowSprites[i].position.copy(sun.mesh.position);
        });
    }
}

/**
 * Helper to find the noise sphere material in the scene
 */
function getNoiseMaterial(scene) {
    // Find the noise sphere material in the scene
    let material = null;
    scene.traverse(obj => {
        if (obj.isMesh && obj.material && obj.material.uniforms && obj.material.uniforms.iTime) {
            material = obj.material;
        }
    });
    return material;
}

/**
 * Load the core model (GLB), or fallback to icosahedron
 */

            const geometry = new THREE.IcosahedronGeometry(CORE_FALLBACK_SIZE, CORE_FALLBACK_DETAIL);

// === PROCEDURAL STARFIELD SKYBOX ===
function createStarfield(scene, {
    starCount = 4000,
    radius = 9000,
    minSize = 0.5,
    maxSize = 2.2
} = {}) {
    const geometry = new THREE.BufferGeometry();
    const positions = [];
    const sizes = [];
    for (let i = 0; i < starCount; i++) {
        // Random point on sphere
        const theta = Math.random() * 2 * Math.PI;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = radius;
        const x = r * Math.sin(phi) * Math.cos(theta);
        const y = r * Math.sin(phi) * Math.sin(theta);
        const z = r * Math.cos(phi);
        positions.push(x, y, z);
        sizes.push(minSize + Math.random() * (maxSize - minSize));
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
    const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 2.0,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.85,
        depthWrite: false
    });
    const starfield = new THREE.Points(geometry, material);
    starfield.frustumCulled = false;
    scene.add(starfield);
}

/**
 * Set up post-processing (bloom, etc)
 */
function initPostProcessing(renderer, scene, camera) {
    const composer = new EffectComposer(renderer);
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        BLOOM_PARAMS.bloomStrength,
        BLOOM_PARAMS.bloomRadius,
        BLOOM_PARAMS.bloomThreshold
    );
    composer.addPass(renderScene);
    composer.addPass(bloomPass);
    return composer;
}

/**
 * Enable the bloom layer for an object and all its children
 */
function setBloomLayer(object) {
    object.layers.enable(BLOOM_LAYER);
    if (object.children) {
        object.children.forEach(setBloomLayer);
    }
}

/** Add four orbiting sun meshes */

        { color: 0xFFFFCC, emissive: 0xFFFFAA, size: 25, y: 50, z: 2800, orbitSpeed: 0.04, angle: 0 }, // Largest, original

        { color: 0x00CCFF, emissive: 0x00AADD, size: 40, y: 40, z: 1500, orbitSpeed: 0.05, angle: Math.PI }, // Medium-small
        { color: 0xFF33CC, emissive: 0xFF33AA, size: 30, y: 30, z: 900, orbitSpeed: 0.07, angle: Math.PI * 1.5 }, // Smallest

    // Center of orbit (will be updated to abstractCore position if loaded)

    suns = [];

        lensflare.addElement(new LensflareElement(flareTexture2, 60, 0.6));

        (gltf) => {

            abstractCore.scale.set(1, 1, 1);

            // Add a sprite-based glow to the Sphere_Core_0 mesh
            let coreMesh = null;
            abstractCore.traverse((child) => {
                if (child.isMesh && child.name === "Sphere_Core_0") {
                    coreMesh = child;
                }
            });
            if (coreMesh) {
                const textureLoader = new THREE.TextureLoader();
                const glowTexture = textureLoader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/textures/sprites/glow.png');
                const glowMaterial = new THREE.SpriteMaterial({
                    map: glowTexture,
                    color: 0x00ffff, // Cyan glow
                    transparent: true,
                    opacity: 1.0 // Max brightness
                });
                const glowSprite = new THREE.Sprite(glowMaterial);
                glowSprite.scale.set(16, 16, 1); // Much larger and brighter
                glowSprite.position.set(0, 0, 0); // Centered on the core mesh
                coreMesh.add(glowSprite);
            }
    
    // Set up materials for glowing effect
    abstractCore.traverse((child) => {
        if (child.isMesh) {
            // Store original material
            child.originalMaterial = child.material;
            // Create new material with original properties
            child.material = child.material.clone();
        }
    });
    
    // Set up animation mixer and state
    if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(abstractCore);
        
        // Store animation data
        window.animationState = {
            actions: [],
            isForward: true,

            pauseDuration: 5, // seconds to pause at end
            timeScale: 1.0,

            // Random rotation parameters
            rotation: {

                noiseOffset: {

                }

        // Simple noise function (since we don't have access to Perlin noise)

                   Math.sin(x/15) * 0.25 + 
                   Math.sin(x/20) * 0.125;
        };

        gltf.animations.forEach((clip) => {
            const action = mixer.clipAction(clip);
            action.clampWhenFinished = true;
            action.loop = THREE.LoopOnce;
            window.animationState.actions.push(action);
        });

        // Start playing forward
        window.animationState.actions.forEach(action => {

    /** Animation loop */

    // Store mixer for animations
    mixer = undefined;
    let frameCount = 0; // For frame skipping

    function animate() {
    // Update noise sphere shader time
    noiseMaterial.uniforms.iTime.value = clock.getElapsedTime();
        requestAnimationFrame(animate);
        
        // Update animations
        const delta = clock.getDelta();
        if (mixer && window.animationState) {
            const state = window.animationState;
            const actions = state.actions;
            
            if (actions.length > 0) {
                const action = actions[0]; // Use first animation as reference
                const time = action.time;
                const duration = action._clip.duration;
                
                if (!state.isPaused) {
                    // Calculate how close we are to the end (0 = start, 1 = end)
                    const progress = state.isForward ? time / duration : 1 - (time / duration);
                    
                    // Apply easing when near the end
                    if (progress > (duration - state.easingDuration) / duration) {
                        const easeProgress = (progress - ((duration - state.easingDuration) / duration)) / (state.easingDuration / duration);
                        state.timeScale = 1.0 - (easeProgress * 0.9); // Slow down to 10% speed
                    } else {
                        state.timeScale = 1.0;
                    }
                    
                    // Check if animation reached end
                    if (state.isForward && time >= duration - 0.001 || 
                        !state.isForward && time <= 0.001) {
                        state.isPaused = true;
                        state.pauseStartTime = clock.getElapsedTime();
                    }
                    
                    // Apply timeScale to all actions
                    actions.forEach(a => a.timeScale = state.isForward ? state.timeScale : -state.timeScale);
                    mixer.update(delta);
                } else {
                    // Handle pause and reverse
                    const pauseElapsed = clock.getElapsedTime() - state.pauseStartTime;
                    if (pauseElapsed >= state.pauseDuration) {
                        state.isPaused = false;
                        state.isForward = !state.isForward;
                        state.timeScale = 1.0;
                        
                        // Reset and restart animations in new direction
                        actions.forEach(action => {
                            action.timeScale = state.isForward ? 1 : -1;
                            if (state.isForward) {
                                action.reset();
                                action.play();
                            }
                        });
                    }
                }
            }
        }
        
        // Update abstract core animation
        if (abstractCore) {
            const time = clock.getElapsedTime();
            
            // Smooth random rotation
            abstractCore.rotation.x = Math.sin(time * 0.5) * 0.2;
            abstractCore.rotation.y = Math.cos(time * 0.3) * 0.3;
            abstractCore.rotation.z = Math.sin(time * 0.4) * 0.1;
            
            // Add some gentle floating motion
            abstractCore.position.y = 5 + Math.sin(time * 0.8) * 0.5;
        }
        
        // Update sun orbits
        if (suns && suns.length > 0) {
            const t = clock.getElapsedTime();
            suns.forEach((sun, i) => {
                // Update angle based on speed
                sun.angle += sun.speed;
                
                // Calculate new position
                const x = orbitCenter.x + sun.radius * Math.cos(sun.angle);
                const z = orbitCenter.z + sun.radius * Math.sin(sun.angle);
                
                // Update sun position
                sun.mesh.position.set(x, sun.y, z);
                
                // Update associated lensflare and glow sprite
                sun.mesh.position.y = sun.y + orbitCenter.y - 5; // adjust for core's Y
                // Update lensflare and glow position
                if (lensflares[i]) lensflares[i].position.copy(sun.mesh.position);
                if (glowSprites[i]) glowSprites[i].position.copy(sun.mesh.position);
            });
        }
        // --- Selective Bloom Render ---
        // 1. Render bloom pass (only glowing objects)
        camera.layers.set(BLOOM_LAYER);
        composer.render();

        // 2. Render the rest of the scene (non-bloom objects, no bloom)
        camera.layers.set(0);
        renderer.autoClear = false;
        renderer.clearDepth(); // Clear depth so both layers show up
        renderer.render(scene, camera);
        renderer.autoClear = true;
    }
    animate();
}
