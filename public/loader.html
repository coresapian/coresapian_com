<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing...</title>
    <style>
        :root {
            /* Unified Cosmic-Nordic Palette */
            --void-black: #0a0a1f;
            --stellar-dark: #1a1a3a;
            --nordic-slate: #2E3440;
            --cosmic-orange: #ff4800;
            --stellar-gold: #ffc700;
            --frost-blue: #88C0D0;
            --deep-blue: #5E81AC;
            --frost-white: #ECEFF4;
            --aurora-green: #A3BE8C;
            --mist-gray: #D8DEE9;
        }
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--void-black);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .loader-container {
            position: relative;
            width: 80vmin;
            height: 80vmin;
            max-width: 500px;
            max-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            --progress-bar-color: transparent;
            filter: drop-shadow(0 0 20px var(--cosmic-orange));
            z-index: 1;
        }
        
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 200, 100, 0.9), rgba(255, 72, 0, 0.8), rgba(200, 50, 0, 0.6));
            box-shadow: 0 0 20px rgba(255, 72, 0, 0.8), inset 0 0 10px rgba(255, 200, 100, 0.3);
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            z-index: 0;
        }
        
        .orb1 {
            width: 15px;
            height: 15px;
            animation: orbit1 8s infinite;
            background: radial-gradient(circle at 30% 30%, rgba(255, 180, 80, 0.9), rgba(255, 72, 0, 0.8), rgba(180, 40, 0, 0.6));
            box-shadow: 0 0 15px rgba(255, 72, 0, 0.7), inset 0 0 8px rgba(255, 180, 80, 0.4);
        }
        
        .orb2 {
            width: 22px;
            height: 22px;
            animation: orbit2 12s infinite;
            background: radial-gradient(circle at 30% 30%, rgba(255, 220, 120, 0.9), rgba(255, 100, 20, 0.8), rgba(220, 60, 10, 0.6));
            box-shadow: 0 0 25px rgba(255, 100, 20, 0.8), inset 0 0 12px rgba(255, 220, 120, 0.3);
        }
        
        .orb3 {
            width: 18px;
            height: 18px;
            animation: orbit3 10s infinite;
            background: radial-gradient(circle at 30% 30%, rgba(255, 160, 60, 0.9), rgba(255, 50, 0, 0.8), rgba(160, 30, 0, 0.6));
            box-shadow: 0 0 18px rgba(255, 50, 0, 0.7), inset 0 0 9px rgba(255, 160, 60, 0.4);
        }
        
        @keyframes orbit1 {
            0% { transform: translate(120px, 0) rotate(0deg) translate(-120px, 0); }
            25% { transform: translate(80px, -100px) rotate(90deg) translate(-80px, 100px); }
            50% { transform: translate(-120px, 0) rotate(180deg) translate(120px, 0); }
            75% { transform: translate(-80px, 100px) rotate(270deg) translate(80px, -100px); }
            100% { transform: translate(120px, 0) rotate(360deg) translate(-120px, 0); }
        }
        
        @keyframes orbit2 {
            0% { transform: translate(0, -140px) rotate(0deg) translate(0, 140px); }
            25% { transform: translate(100px, -70px) rotate(90deg) translate(-100px, 70px); }
            50% { transform: translate(0, 140px) rotate(180deg) translate(0, -140px); }
            75% { transform: translate(-100px, 70px) rotate(270deg) translate(100px, -70px); }
            100% { transform: translate(0, -140px) rotate(360deg) translate(0, 140px); }
        }
        
        @keyframes orbit3 {
            0% { transform: translate(-90px, -90px) rotate(0deg) translate(90px, 90px); }
            25% { transform: translate(90px, -90px) rotate(90deg) translate(-90px, 90px); }
            50% { transform: translate(90px, 90px) rotate(180deg) translate(-90px, -90px); }
            75% { transform: translate(-90px, 90px) rotate(270deg) translate(90px, -90px); }
            100% { transform: translate(-90px, -90px) rotate(360deg) translate(90px, 90px); }
        }
    </style>
    <!-- 3D Model Viewer Component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

    <!-- This displays your GLB animation with orbiting orbs -->
    <div class="loader-container">
        <model-viewer 
            id="hourglass-viewer"
            src="loading_screen_hourglass_animation_model.glb"
            alt="An animated hourglass"
            ar
            ar-modes="webxr scene-viewer quick-look"
            camera-controls
            autoplay
            disable-zoom
            shadow-intensity="1">
        </model-viewer>
        
        <!-- Glowing orange orbs -->
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <script>
        // --- Redirection Logic ---
        const viewer = document.getElementById('hourglass-viewer');

        // Set the duration of your animation in milliseconds.
        // For example, if the animation is 5 seconds long, use 5000.
        const animationDuration = 9000; // <-- ADJUST THIS VALUE

        // Wait for the animation to finish, then redirect to the rune puzzle.
        setTimeout(() => {
            // The path to your rune puzzle file.
            window.location.href = 'rune_puzzle/index.html'; 
        }, animationDuration);

    </script>

</body>
</html>
