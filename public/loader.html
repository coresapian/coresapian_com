<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Initializing…</title>
  <!-- Preconnect hints for faster loading -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
  <style>
    body{margin:0;overflow:hidden;background:#0a0a1f}
    #container{width:100vw;height:100vh}
  </style>
</head>
<body>
  <div id="container"></div>

  <!-- Import map – Three.js 0.162.0 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    /* ------------------------------------------------------------------
       SAFE-LOADER – prints crystal-clear errors in the console
    ------------------------------------------------------------------ */
    import * as THREE from 'three';

    // ---------- 1.  Feature-guard ----------
    if (!window.WebGL2RenderingContext) {
      console.error('[LOADER] WebGL2 unavailable – aborting.');
      document.body.innerHTML =
        '<h1 style="color:#ff4800;text-align:center;margin-top:40vh">WebGL2 not supported by this browser.</h1>';
      throw new Error('WebGL2 unavailable');
    }

    // ---------- 2.  Three.js sanity ----------
    if (!THREE.REVISION) {
      console.error('[LOADER] Three.js failed to load – check import-map / network.');
      document.body.innerHTML =
        '<h1 style="color:#ff4800;text-align:center;margin-top:40vh">Could not load Three.js.</h1>';
      throw new Error('THREE undefined');
    }

    // ---------- 3.  Dynamic import of required modules ----------
    let GLTFLoader;
    try {
      const m = await import('three/addons/loaders/GLTFLoader.js');
      GLTFLoader = m.GLTFLoader;
    } catch (e) {
      console.error('[LOADER] Failed to load GLTFLoader:', e);
      document.body.innerHTML =
        '<h1 style="color:#ff4800;text-align:center;margin-top:40vh">Could not load graphics modules.</h1>';
      throw e;
    }

    // ---------- 4.  Scene bootstrap ----------
    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 3000);
    camera.position.set(0, 0, 3.5);

    const renderer = new THREE.WebGLRenderer({antialias: true});
    // Cap pixel ratio to 2 for better performance on high-DPI displays
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.autoClear = false;
    container.appendChild(renderer.domElement);

    // ---------- 5.  Load model ----------
    const modelUrl = 'loading_screen_hourglass_animation_model.glb';
    const fallbackUrl = 'https://raw.githubusercontent.com/Artificial-Me/coresapian/main/public/loading_screen_hourglass_animation_model.glb';
    const loader = new GLTFLoader();
    let mixer;

    const loadModel = (url) => {
      loader.load(
        url,
        gltf => {
          const model = gltf.scene;
          model.scale.setScalar(1.5);
          model.position.set(0, -0.5, 0);
          scene.add(model);
          if (gltf.animations?.length) {
            mixer = new THREE.AnimationMixer(model);
            mixer.clipAction(gltf.animations[0]).play();
          }
        },
        undefined,
        err => {
          if (url !== fallbackUrl) {
            console.warn('[LOADER] Local model failed, trying fallback:', err.message);
            loadModel(fallbackUrl);
          } else {
            console.error('[LOADER] Hourglass model failed to load:', err);
          }
        }
      );
    };

    loadModel(modelUrl);

    // ---------- 6.  Animation loop ----------
    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const delta = clock.getDelta();
      mixer?.update(delta);
      renderer.clear();
      renderer.render(scene, camera);
    });

    // ---------- 7.  Redirect after 9s ----------
    setTimeout(() => {
      location.href = 'rune_puzzle/index.html';
    }, 9000);

    // ---------- 8.  Resize ----------
    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
