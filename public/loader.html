<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Initializing…</title>
  <style>
    body{margin:0;overflow:hidden;background:#0a0a1f}
    #container{width:100vw;height:100vh}
  </style>
</head>
<body>
  <div id="container"></div>

  <!-- Import map – fails loudly if CDN unreachable -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.138.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.138.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    /* ------------------------------------------------------------------
       SAFE-LOADER – prints crystal-clear errors in the console
    ------------------------------------------------------------------ */
    import * as THREE from 'three';
    const log = (lvl, ...a)=>console[lvl]('[LOADER]', ...a);

    // ---------- 1.  Feature-guard ----------
    if (!window.WebGL2RenderingContext) {
      log('error','WebGL2 unavailable – aborting.');
      document.body.innerHTML =
        '<h1 style="color:#ff4800;text-align:center;margin-top:40vh">WebGL2 not supported by this browser.</h1>';
      throw new Error('WebGL2 unavailable');
    }

    // ---------- 2.  Three.js sanity ----------
    if (!THREE.REVISION) {
      log('error','Three.js failed to load – check import-map / network.');
      document.body.innerHTML =
        '<h1 style="color:#ff4800;text-align:center;margin-top:40vh">Could not load Three.js.</h1>';
      throw new Error('THREE undefined');
    }

    // ---------- 3.  Dynamic import of optional modules ----------
    let GLTFLoader, EffectComposer, RenderPass, UnrealBloomPass, GodRays;
    try {
      const m = await Promise.all([
        import('three/addons/loaders/GLTFLoader.js'),
        import('three/addons/postprocessing/EffectComposer.js'),
        import('three/addons/postprocessing/RenderPass.js'),
        import('three/addons/postprocessing/UnrealBloomPass.js'),
        import('three/addons/shaders/GodRaysShader.js')
      ]);
      [GLTFLoader, EffectComposer, RenderPass, UnrealBloomPass, GodRays] =
        [m[0].GLTFLoader, m[1].EffectComposer, m[2].RenderPass, m[3].UnrealBloomPass, m[4]];
    } catch (e) {
      log('error','Failed to load Three.js add-ons:', e);
      document.body.innerHTML =
        '<h1 style="color:#ff4800;text-align:center;margin-top:40vh">Could not load graphics modules.</h1>';
      throw e;
    }

    // ---------- 4.  Scene bootstrap ----------
    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, .1, 3000);
    camera.position.set(0,0,3.5);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.autoClear = false;
    container.appendChild(renderer.domElement);

    // ---------- 5.  Load model ----------
    const modelUrl = 'https://raw.githubusercontent.com/Artificial-Me/coresapian/main/public/loading_screen_hourglass_animation_model.glb';
    const loader = new GLTFLoader();
    let mixer;
    loader.load(
      modelUrl,
      gltf=>{
        const model = gltf.scene;
        model.scale.setScalar(1.5);
        model.position.set(0,-.5,0);
        scene.add(model);
        if (gltf.animations?.length) {
          mixer = new THREE.AnimationMixer(model);
          mixer.clipAction(gltf.animations[0]).play();
        }
      },
      undefined,
      err=>{
        log('error','Hourglass model failed to load:', err);
      }
    );

    // ---------- 6.  Tiny animation loop ----------
    const clock = new THREE.Clock();
    renderer.setAnimationLoop(()=>{
      const delta = clock.getDelta();
      mixer?.update(delta);
      renderer.clear();
      renderer.render(scene,camera);
    });

    // ---------- 7.  Redirect after 9 s ----------
    setTimeout(()=>location.href='../rune_puzzle/index.html', 9000);

    // ---------- 8.  Resize ----------
    addEventListener('resize',()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
  </script>
</body>
</html>
