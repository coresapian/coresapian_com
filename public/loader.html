<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing...</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1f; /* Void Black */
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- Import map for three.js and its addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.138.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.138.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { GodRaysFakeSunShader, GodRaysDepthMaskShader, GodRaysCombineShader, GodRaysGenerateShader } from 'three/addons/shaders/GodRaysShader.js';

        let container, camera, scene, renderer, clock, mixer;
        let composer, bloomPass;
        const orbs = [];

        // --- SCENE SETUP ---
        const bgColor = 0x0a0a1f; // Void Black from your palette

        init();

        function init() {
            container = document.getElementById('container');
            clock = new THREE.Clock();

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            container.appendChild(renderer.domElement);

            // Scene
            scene = new THREE.Scene();

            // Camera
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(0, 0, 3.5);

            // --- OBJECTS ---

            // Load Hourglass Model from the raw GitHub URL
            const loader = new GLTFLoader();
            const modelUrl = 'https://raw.githubusercontent.com/Artificial-Me/coresapian/main/public/loading_screen_hourglass_animation_model.glb';
            loader.load(modelUrl, (gltf) => {
                const model = gltf.scene;
                model.scale.set(1.5, 1.5, 1.5);
                model.position.set(0, -0.5, 0);
                scene.add(model);

                // Setup animation
                if (gltf.animations && gltf.animations.length) {
                    mixer = new THREE.AnimationMixer(model);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }
            }, undefined, (error) => {
                console.error('An error happened while loading the model:', error);
            });

            // Create Orbs
            const orbColors = [0xff4800, 0xffc700, 0xffa07a]; // Cosmic Orange, Stellar Gold, Light Salmon
            const orbData = [
                { size: 0.04, speed: 0.5, path: (t) => new THREE.Vector3(1.2 * Math.cos(t), 0.2 * Math.sin(t*2), 1.2 * Math.sin(t)) },
                { size: 0.06, speed: 0.3, path: (t) => new THREE.Vector3(1.4 * Math.sin(t), 1.4 * Math.cos(t), 0) },
                { size: 0.05, speed: 0.4, path: (t) => new THREE.Vector3(1.0 * Math.cos(t), 1.0 * Math.sin(t*0.8), 1.0 * Math.sin(t)) }
            ];

            orbData.forEach((data, i) => {
                const geometry = new THREE.SphereGeometry(data.size, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: orbColors[i] });
                const orb = new THREE.Mesh(geometry, material);
                orb.userData = data;
                orbs.push(orb);
                scene.add(orb);
            });


            // --- POST-PROCESSING ---
            initPostprocessing();

            // --- REDIRECTION & ANIMATION LOOP ---
            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(animate);

            const animationDuration = 9000; // 9 seconds
            setTimeout(() => {
                // Redirect to the next page
                window.location.href = 'rune_puzzle/index.html';
            }, animationDuration);
        }

        function initPostprocessing() {
            const renderTarget = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight, {
                type: THREE.HalfFloatType,
                depthTexture: new THREE.DepthTexture()
            });
            renderTarget.depthTexture.format = THREE.DepthFormat;
            renderTarget.depthTexture.type = THREE.UnsignedShortType;


            // Composer
            composer = new EffectComposer(renderer, renderTarget);
            composer.addPass(new RenderPass(scene, camera));

            // God Rays Pass (using a simplified approach)
            const godraysPass = new ShaderPass(
                {
                    uniforms: {
                        tDiffuse: { value: null },
                        tDepth: { value: renderTarget.depthTexture },
                        cameraNear: { value: camera.near },
                        cameraFar: { value: camera.far },
                        sunPosition: { value: new THREE.Vector3(0, 2, -10) }, // Position the light source
                        fGodRayIntensity: { value: 0.6 },
                    },
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                    fragmentShader: `
                        varying vec2 vUv;
                        uniform sampler2D tDiffuse;
                        uniform sampler2D tDepth;
                        uniform float cameraNear;
                        uniform float cameraFar;
                        uniform vec3 sunPosition;
                        uniform float fGodRayIntensity;

                        float getDepth( const in vec2 screenPosition ) {
                            return texture2D( tDepth, screenPosition ).x;
                        }

                        float getViewZ( const in float depth ) {
                            return perspectiveDepthToViewZ( depth, cameraNear, cameraFar );
                        }

                        void main() {
                            vec4 originalColor = texture2D(tDiffuse, vUv);
                            float depth = getDepth(vUv);
                            float viewZ = getViewZ(depth);

                            vec4 sunScreenPos = projectionMatrix * viewMatrix * vec4(sunPosition, 1.0);
                            sunScreenPos.xyz /= sunScreenPos.w;
                            sunScreenPos.xy = sunScreenPos.xy * 0.5 + 0.5;

                            vec2 delta = sunScreenPos.xy - vUv;
                            float dist = length(delta);
                            vec2 step = delta / dist * 0.005; // Step size for sampling

                            float illuminationDecay = 1.0;
                            float occlusion = 0.0;

                            for (int i = 0; i < 100; i++) {
                                vec2 sampleCoord = vUv + float(i) * step;
                                float sampleDepth = getDepth(sampleCoord);
                                if (getViewZ(sampleDepth) < viewZ) {
                                    occlusion += illuminationDecay;
                                }
                                illuminationDecay *= 0.98;
                            }
                            
                            vec3 godrayColor = vec3(1.0, 0.7, 0.3) * max(0.0, 1.0 - occlusion * 0.02);
                            vec3 finalColor = originalColor.rgb + godrayColor * fGodRayIntensity * max(0.0, 1.0 - dist * 1.2);
                            
                            gl_FragColor = vec4(finalColor, 1.0);
                        }
                    `
                }, 'tDiffuse'
            );

            // Bloom Pass for glowing orbs and hourglass
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.6, 0.3);
            
            composer.addPass(godraysPass);
            composer.addPass(bloomPass);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            composer.setSize(width, height);
            bloomPass.setSize(width, height);
        }

        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();

            if (mixer) {
                mixer.update(delta);
            }

            // Animate orbs
            orbs.forEach(orb => {
                const time = elapsedTime * orb.userData.speed;
                const newPos = orb.userData.path(time);
                orb.position.copy(newPos);
            });

            composer.render();
        }
    </script>
</body>
</html>
