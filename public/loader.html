<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initializing...</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        model-viewer {
            width: 80vmin;
            height: 80vmin;
            max-width: 500px;
            max-height: 500px;
            --progress-bar-color: transparent;
        }
    </style>
    <!-- 3D Model Viewer Component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
</head>
<body>

    <!-- This displays your GLB animation -->
    <model-viewer 
        id="hourglass-viewer"
        src="loading_screen_hourglass_animation_model.glb"
        alt="An animated hourglass"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        autoplay
        disable-zoom
        shadow-intensity="1">
    </model-viewer>

    <script>
        // --- Redirection Logic ---
        const viewer = document.getElementById('hourglass-viewer');

        // Set the duration of your animation in milliseconds.
        // For example, if the animation is 5 seconds long, use 5000.
        const animationDuration = 5000; // <-- ADJUST THIS VALUE

        // Wait for the animation to finish, then redirect to the rune puzzle.
        setTimeout(() => {
            // The path to your rune puzzle file.
            window.location.href = 'rune_puzzle/index.html'; 
        }, animationDuration);

    </script>

</body>
</html>
