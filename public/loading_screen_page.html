<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
            margin: 0;
            overflow: hidden;
        }
        .spinner-box {
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }
        .leo {
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #fff;
            animation: spin 3s linear infinite;
        }
        .blue-orbit {
            width: 120px;
            height: 120px;
            border-top-color: #4d6de6;
            animation-duration: 2s;
        }
        .green-orbit {
            width: 90px;
            height: 90px;
            border-top-color: #1ee644;
            animation-duration: 1.5s;
        }
        .red-orbit {
            width: 60px;
            height: 60px;
            border-top-color: #e62e4d;
            animation-duration: 1s;
        }
        .white-orbit {
            border-top-color: #fff;
        }
        .w1 {
            width: 30px;
            height: 30px;
            animation-duration: 1.2s;
        }
        .w2 {
            width: 30px;
            height: 30px;
            animation-duration: 1.4s;
            transform: rotate(90deg);
        }
        .w3 {
            width: 30px;
            height: 30px;
            animation-duration: 1.6s;
            transform: rotate(180deg);
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        }

            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* New CSS for loading text */
        @import url(https://fonts.googleapis.com/css?family=Source+Code+Pro:400);

        .word {
            bottom: 0;
            color: #fff;
            font-size: 2.5em;
            height: 2.5em;
            left: 0;
            line-height: 2.5em;
            margin: auto;
            right: 0;
            position: absolute;
            text-shadow: 0 0 10px rgba(50, 255, 50, 0.5), 0 0 5px rgba(100, 255, 100, 0.5);
            top: 0;
        }

        .word span {
            display: inline-block;
            transform: translateX(100%) scale(0.9);
            transition: transform 500ms;
        }

        .word .done {
            color: #6f6;
            transform: translateX(0) scale(1);
        }

        .overlay {
            background-image: linear-gradient(transparent 0%, rgba(10, 16, 10, 0.5) 50%);
            background-size: 1000px 2px;
            bottom: 0;
            content: '';
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw;">
        <div class="spinner-box">
            <div class="blue-orbit leo"></div>
            <div class="green-orbit leo"></div>
            <div class="red-orbit leo"></div>
            <div class="white-orbit w1 leo"></div>
            <div class="white-orbit w2 leo"></div>
            <div class="white-orbit w3 leo"></div>
        </div>
        <div class="word">LOADING...</div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lettering.js/0.7.0/jquery.lettering.min.js"></script>
    <script>
        function Ticker( elem ) {
            elem.lettering();
            this.done = false;
            this.cycleCount = 5;
            this.cycleCurrent = 0;
            this.chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890!@#$%^&*()-_=+{}|[]\\;\':"<>?,./`~'.split('');
            this.charsCount = this.chars.length;
            this.letters = elem.find( 'span' );
            this.letterCount = this.letters.length;
            this.letterCurrent = 0;

            this.letters.each( function() {
                var $this = $( this );
                $this.attr( 'data-orig', $this.text() );
                $this.text( '-' );
            });
        }

        Ticker.prototype.getChar = function() {
            return this.chars[ Math.floor( Math.random() * this.charsCount ) ];
        };

        Ticker.prototype.reset = function() {
            this.done = false;
            this.cycleCurrent = 0;
            this.letterCurrent = 0;
            this.letters.each( function() {
                var $this = $( this );
                $this.text( $this.attr( 'data-orig' ) );
                $this.removeClass( 'done' );
            });
            this.loop();
        };

        Ticker.prototype.loop = function() {
            var self = this;

            this.letters.each( function( index, elem ) {
                var $elem = $( elem );
                if( index >= self.letterCurrent ) {
                    if( $elem.text() !== ' ' ) {
                        $elem.text( self.getChar() );
                        $elem.css( 'opacity', Math.random() );
                    }
                }
            });

            if( this.cycleCurrent < this.cycleCount ) {
                this.cycleCurrent++;
            } else if( this.letterCurrent < this.letterCount ) {
                var currLetter = this.letters.eq( this.letterCurrent );
                this.cycleCurrent = 0;
                currLetter.text( currLetter.attr( 'data-orig' ) ).css( 'opacity', 1 ).addClass( 'done' );
                this.letterCurrent++;
            } else {
                this.done = true;
            }

            if( !this.done ) {
                requestAnimationFrame( function() {
                    self.loop();
                });
            } else {
                setTimeout( function() {
                    self.reset();
                }, 750 );
            }
        };

        $words = $( '.word' );

        $words.each( function() {
            var $this = $( this ),
                ticker = new Ticker( $this ).reset();
            $this.data( 'ticker', ticker  );
        });
    </script>
</body>
</html>
