<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>coRE - Rune Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Warm vignette (replaces torch) -->
  <div id="warm-vignette"></div>

  <!-- Golden dust particles (replaces matrix rain) -->
  <canvas id="dust-canvas"></canvas>

  <!-- Puzzle -->
  <div id="orrery-container">
    <div id="orrery-heart"></div>
    <svg id="orrery-energy-lines-svg"></svg>
  </div>
  <div id="secret-message-display"></div>

  <!-- External libs -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/EasePack.min.js"></script>

  <!-- Golden dust particles -->
  <script>
  (function() {
    const canvas = document.getElementById('dust-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    const COUNT = 35;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < COUNT; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2 + 0.5,
        speedX: (Math.random() - 0.5) * 0.3,
        speedY: -Math.random() * 0.15 - 0.03,
        opacity: Math.random() * 0.4 + 0.15,
        hue: Math.random() * 20 + 35
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue}, 55%, 62%, ${p.opacity})`;
        ctx.fill();
        p.x += p.speedX;
        p.y += p.speedY;
        p.opacity += (Math.random() - 0.5) * 0.015;
        p.opacity = Math.max(0.08, Math.min(0.55, p.opacity));
        if (p.y < -5) p.y = canvas.height + 5;
        if (p.x < -5) p.x = canvas.width + 5;
        if (p.x > canvas.width + 5) p.x = -5;
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>

  <script src="puzzle.js"></script>
</body>
</html>
