<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>The Celestial Orrery of ᚲᛟᚱᛖ</title>
  <link rel="stylesheet" href="style.css">
  <!-- Preconnect to CDNs for faster loading -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
</head>
<body>
  <!-- TORCH (same as before) -->
  <div id="torch-overlay"></div>

  <!-- God-rays canvas -->
  <div id="godrays-container"></div>

  <!-- Matrix rain -->
  <canvas id="matrix-canvas"></canvas>

  <!-- Puzzle -->
  <div id="orrery-container">
    <div id="orrery-heart"></div>
    <svg id="orrery-energy-lines-svg"></svg>
  </div>
  <div id="secret-message-display"></div>

  <!-- External libs - GSAP 3.14.0 -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.0/dist/EasePack.min.js"></script>

  <!-- Three.js via import-map - Updated to 0.162.0 -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
      }
    }
  </script>

  <script type="module" src="puzzle.js"></script>
</body>
</html>
