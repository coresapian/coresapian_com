<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Celestial Orrery of ᚲᛟᚱᛖ</title>
    <style>
        @font-face {
            font-family: 'Noto Sans Runic';
            src: url('../fonts/Noto_Sans_Runic/NotoSansRunic-Regular.ttf') format('truetype');
        }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            /* Unified Cosmic-Nordic Palette */
            --void-black: #0a0a1f;
            --stellar-dark: #1a1a3a;
            --nordic-slate: #2E3440;
            --cosmic-orange: #ff4800;
            --stellar-gold: #ffc700;
            --frost-blue: #88C0D0;
            --deep-blue: #5E81AC;
            --frost-white: #ECEFF4;
            --aurora-green: #A3BE8C;
            --mist-gray: #D8DEE9;

            /* Orrery-specific mappings */
            --orrery-bg-dark: transparent; /* Make puzzle background transparent */
            --orrery-accent-color: var(--frost-blue);
            --orrery-heart-inactive: var(--nordic-slate);
            --orrery-heart-active: var(--cosmic-orange);
            --socket-color: rgba(94, 129, 172, 0.2);
            --socket-hover-color: rgba(136, 192, 208, 0.4);
            --socket-active-glow: rgba(136, 192, 208, 0.6);
            --socket-placeholder-color: rgba(216, 222, 233, 0.2);
            --glyph-color: rgba(136, 192, 208, 0.7);
            --glyph-glow: rgba(136, 192, 208, 0.5);
            --glyph-active-color: var(--frost-white);
            --glyph-active-glow: rgba(236, 239, 244, 0.9);
            --glyph-decoy-tint: rgba(216, 222, 233, 0.6);
            --glyph-locked-color: var(--cosmic-orange);
            --glyph-locked-glow: var(--stellar-gold);
            --glyph-rejection-color: #ff0000;
            --energy-line-color: var(--cosmic-orange);
            --secret-message-color: var(--stellar-gold);
            --font-family-glyphs: 'Noto Sans Runic', cursive;
            --font-family-ui: 'Orbitron', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background-color: var(--orrery-bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* --- TORCH EFFECT STYLES --- */
        #torch-overlay {
          position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
          z-index: 1000; /* High z-index to be on top */
          --torch-size: 400px;
          --torch-x: 50vw;
          --torch-y: 50vh;
          --torch-brightness: 0.5;
          background: radial-gradient(
            circle var(--torch-size) at var(--torch-x) var(--torch-y),
            hsla(40, 100%, 80%, var(--torch-brightness)) 0%,
            transparent 40%,
            rgba(0, 0, 0, 0.9) 100%
          );
          --torch-flicker-opacity: 0.2;
          --flicker-size: 500px;
          pointer-events: none; /* Crucial: allows clicks/drags to pass through */
        }
        #torch-overlay::after {
          content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
          background: radial-gradient(
            circle var(--flicker-size) at var(--torch-x) var(--torch-y),
            rgba(245, 121, 6, 0.2) 0%, transparent 50%
          );
          opacity: var(--torch-flicker-opacity);
        }
        .touch-device #torch-overlay { background: transparent; }


        #godrays-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Behind everything */
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 90;
            opacity: 0.25;
            pointer-events: none;
            display: block;
        }

        #orrery-container {
            position: relative;
            width: 70vmin;
            height: 70vmin;
            max-width: 600px;
            max-height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
            z-index: 2; /* On top of godrays, behind torch */
        }

        #orrery-heart {
            width: 15vmin; height: 15vmin;
            max-width: 100px; max-height: 100px;
            background-color: var(--orrery-heart-inactive);
            border-radius: 50%;
            position: absolute;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.7), 0 0 10px var(--orrery-heart-inactive);
            transition: background-color 1s ease, box-shadow 1s ease;
            display: flex; justify-content: center; align-items: center;
            z-index: 5;
        }
        #orrery-heart.active {
            background-color: var(--orrery-heart-active);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5),
                        0 0 20px var(--orrery-heart-active),
                        0 0 40px var(--orrery-heart-active),
                        0 0 80px rgba(255,215,0,0.5);
            animation: pulseHeartActive 2s infinite ease-in-out;
        }
        @keyframes pulseHeartActive {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .constellation-socket {
            position: absolute;
            width: 12vmin; height: 12vmin;
            max-width: 80px; max-height: 80px;
            background-color: var(--socket-color);
            border: 2px solid var(--nordic-slate);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.4), 0 0 5px var(--nordic-slate);
            transform-style: preserve-3d;
            z-index: 15;
        }
        .constellation-socket .socket-glyph-placeholder {
            font-family: var(--font-family-glyphs);
            font-size: 7vmin;
            color: var(--socket-placeholder-color);
            opacity: 0.5;
            transition: opacity 0.3s, color 0.3s;
            animation: pulsePlaceholder 4s infinite ease-in-out;
        }
        @keyframes pulsePlaceholder {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }
        .constellation-socket.resonating {
            background-color: var(--socket-hover-color);
            box-shadow: inset 0 0 12px rgba(0,0,0,0.5), 0 0 15px var(--socket-active-glow), 0 0 25px var(--socket-active-glow);
            transform: scale(1.1);
        }
        .constellation-socket.resonating .socket-glyph-placeholder {
            color: var(--socket-active-glow);
            opacity: 1;
            animation: none;
        }
        .constellation-socket.rejecting {
            animation: rejectSocket 0.4s ease-out;
        }
        @keyframes rejectSocket {
            0%, 100% { transform: translateX(0) scale(1); background-color: var(--socket-color); }
            50% { transform: translateX(5px) scale(1.05); background-color: rgba(255,80,80,0.3); }
        }
        .constellation-socket.filled .socket-glyph-placeholder {
            opacity: 0;
            animation: none;
        }

        .starlight-glyph {
            position: absolute;
            font-family: var(--font-family-glyphs);
            font-size: 10vmin;
            color: var(--glyph-color);
            text-shadow: 0 0 5px var(--glyph-glow), 0 0 10px var(--glyph-glow);
            cursor: grab;
            user-select: none;
            padding: 8px;
            border-radius: 50%;
            transition: transform 0.15s linear, color 0.3s ease, text-shadow 0.3s ease, opacity 0.3s ease;
            animation: floatGlyph 10s infinite ease-in-out alternate;
            z-index: 20;
            opacity: 0.9;
            background-color: rgba(50,50,80,0.1);
        }
        .starlight-glyph.decoy {
            color: var(--glyph-decoy-tint);
            text-shadow: 0 0 4px var(--glyph-decoy-tint);
            animation-duration: 12s;
        }
        .starlight-glyph.rejected-glyph {
            animation: glyphRejectAnim 0.5s ease-out;
            color: var(--glyph-rejection-color) !important;
            text-shadow: 0 0 5px var(--glyph-rejection-color) !important;
        }
        @keyframes glyphRejectAnim {
            0% { transform: scale(1.1) rotate(0deg); }
            25% { transform: scale(1.15) rotate(-8deg); }
            50% { transform: scale(1.1) rotate(8deg); }
            75% { transform: scale(1.15) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }


        @keyframes floatGlyph {
            from { transform: translateY(0px) translateX(0px) rotateZ(-2deg) scale(0.9); }
            to   { transform: translateY(-15px) translateX(5px) rotateZ(2deg) scale(1); }
        }
        .starlight-glyph.dragging {
            color: var(--glyph-active-color);
            text-shadow: 0 0 10px var(--glyph-active-glow), 0 0 20px var(--glyph-active-glow);
            transform: scale(1.2);
            opacity: 1;
            animation: none;
            cursor: grabbing;
            z-index: 100;
        }
        .starlight-glyph.locked {
            position: static !important;
            color: var(--glyph-locked-color);
            text-shadow: 0 0 10px var(--glyph-locked-glow), 0 0 25px var(--glyph-locked-glow), 0 0 40px var(--glyph-locked-glow);
            transform: scale(1) !important;
            opacity: 1;
            animation: lockGlyph 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), pulseGlyphLocked 2.5s infinite ease-in-out 0.6s;
            cursor: default;
            background-color: transparent;
            z-index: 16;
        }
        @keyframes lockGlyph {
            0% { transform: scale(1.8) translateY(-30px) rotateZ(45deg); opacity: 0.3; }
            70% { transform: scale(0.9) translateY(5px) rotateZ(-5deg); }
            100% { transform: scale(1) translateY(0px) rotateZ(0deg); opacity: 1; }
        }
        @keyframes pulseGlyphLocked {
            0%, 100% { text-shadow: 0 0 10px var(--glyph-locked-glow), 0 0 25px var(--glyph-locked-glow); }
            50% { text-shadow: 0 0 15px var(--glyph-locked-glow), 0 0 35px var(--glyph-locked-glow), 0 0 50px var(--glyph-locked-glow); }
        }

        #secret-message-display {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            text-align: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out 1s;
            font-family: var(--font-family-ui);
            font-size: 3vmin;
            color: var(--secret-message-color);
            text-shadow: 0 0 8px var(--secret-message-color), 0 0 15px var(--glyph-locked-glow);
            z-index: 50;
        }
        #secret-message-display.visible {
            opacity: 1;
        }

        #orrery-energy-lines-svg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .orrery-energy-line {
            stroke: var(--energy-line-color);
            stroke-width: 2.5;
            stroke-linecap: round;
            filter: drop-shadow(0 0 4px var(--energy-line-color));
            opacity: 0;
            transition: opacity 0.1s linear;
        }
        .orrery-energy-line.visible {
            opacity: 0.85;
            animation: pulseLine 2s infinite ease-in-out;
        }
        @keyframes pulseLine {
            0%, 100% { opacity: 0.85; stroke-width: 2.5; }
            50% { opacity: 1; stroke-width: 3; }
        }

        .orrery-energy-line.outer-circle {
            stroke-width: 3;
            filter: drop-shadow(0 0 6px var(--energy-line-color));
        }
        .orrery-energy-line.socket-radiant {
            stroke-width: 1.5;
            opacity: 0;
        }
        .orrery-energy-line.socket-radiant.visible {
            opacity: 0.6;
            animation: pulseLine 2.5s infinite ease-in-out 0.2s;
        }

        .drawing-circle {
            stroke: var(--energy-line-color);
            stroke-width: 3;
            fill: none;
            filter: drop-shadow(0 0 6px var(--energy-line-color));
            opacity: 0;
        }
        .drawing-circle.visible {
             opacity: 0.7;
             animation: pulseLine 3s infinite ease-in-out 0.5s;
        }

        .line-tracer {
            fill: var(--energy-line-color);
            r: 3px;
            filter: drop-shadow(0 0 5px var(--energy-line-color)) drop-shadow(0 0 10px white);
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- TORCH EFFECT -->
    <div id="torch-overlay"></div>

    <div id="godrays-container"></div>
    <canvas id="matrix-canvas"></canvas>
    <div id="orrery-container">
        <div id="orrery-heart"></div>
        <svg id="orrery-energy-lines-svg"></svg>
    </div>
    <div id="secret-message-display"></div>

    <!-- TORCH EFFECT SCRIPT DEPENDENCIES -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/EasePack.min.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.138.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.138.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        // --- GOD RAYS SCRIPT ---
        import * as THREE from 'three';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GodRaysFakeSunShader, GodRaysDepthMaskShader, GodRaysCombineShader, GodRaysGenerateShader } from 'three/addons/shaders/GodRaysShader.js';

        let container;
        let camera, scene, renderer, materialDepth;
        let sphereMesh;

        const sunPosition = new THREE.Vector3(0, 1000, -1000);
        const clipPosition = new THREE.Vector4();
        const screenSpacePosition = new THREE.Vector3();

        const postprocessing = { enabled: true };

        const orbitRadius = 200;

        const bgColor = 0x000511;
        const sunColor = 0xffee00;

        const godrayRenderTargetResolutionMultiplier = 1.0 / 4.0;

        init();

        function init() {
            container = document.getElementById('godrays-container');

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.z = 200;

            scene = new THREE.Scene();

            materialDepth = new THREE.MeshDepthMaterial();

            const loader = new OBJLoader();
            loader.load('https://threejs.org/examples/models/obj/tree.obj', function (object) {
                object.position.set(0, -150, -150);
                object.scale.multiplyScalar(400);
                scene.add(object);
            });

            const geo = new THREE.SphereGeometry(1, 20, 10);
            sphereMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x000000 }));
            sphereMesh.scale.multiplyScalar(20);
            scene.add(sphereMesh);

            renderer = new THREE.WebGLRenderer();
            renderer.setClearColor(0xffffff);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            container.appendChild(renderer.domElement);

            renderer.autoClear = false;

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.minDistance = 50;
            controls.maxDistance = 500;

            window.addEventListener('resize', onWindowResize);

            initPostprocessing(window.innerWidth, window.innerHeight);
        }

        function onWindowResize() {
            const renderTargetWidth = window.innerWidth;
            const renderTargetHeight = window.innerHeight;

            camera.aspect = renderTargetWidth / renderTargetHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(renderTargetWidth, renderTargetHeight);
            postprocessing.rtTextureColors.setSize(renderTargetWidth, renderTargetHeight);
            postprocessing.rtTextureDepth.setSize(renderTargetWidth, renderTargetHeight);
            postprocessing.rtTextureDepthMask.setSize(renderTargetWidth, renderTargetHeight);

            const adjustedWidth = renderTargetWidth * godrayRenderTargetResolutionMultiplier;
            const adjustedHeight = renderTargetHeight * godrayRenderTargetResolutionMultiplier;
            postprocessing.rtTextureGodRays1.setSize(adjustedWidth, adjustedHeight);
            postprocessing.rtTextureGodRays2.setSize(adjustedWidth, adjustedHeight);
        }

        function initPostprocessing(renderTargetWidth, renderTargetHeight) {
            postprocessing.scene = new THREE.Scene();
            postprocessing.camera = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, -10000, 10000);
            postprocessing.camera.position.z = 100;
            postprocessing.scene.add(postprocessing.camera);

            postprocessing.rtTextureColors = new THREE.WebGLRenderTarget(renderTargetWidth, renderTargetHeight, { type: THREE.HalfFloatType });
            postprocessing.rtTextureDepth = new THREE.WebGLRenderTarget(renderTargetWidth, renderTargetHeight, { type: THREE.HalfFloatType });
            postprocessing.rtTextureDepthMask = new THREE.WebGLRenderTarget(renderTargetWidth, renderTargetHeight, { type: THREE.HalfFloatType });

            const adjustedWidth = renderTargetWidth * godrayRenderTargetResolutionMultiplier;
            const adjustedHeight = renderTargetHeight * godrayRenderTargetResolutionMultiplier;
            postprocessing.rtTextureGodRays1 = new THREE.WebGLRenderTarget(adjustedWidth, adjustedHeight, { type: THREE.HalfFloatType });
            postprocessing.rtTextureGodRays2 = new THREE.WebGLRenderTarget(adjustedWidth, adjustedHeight, { type: THREE.HalfFloatType });

            const godraysMaskShader = GodRaysDepthMaskShader;
            postprocessing.godrayMaskUniforms = THREE.UniformsUtils.clone(godraysMaskShader.uniforms);
            postprocessing.materialGodraysDepthMask = new THREE.ShaderMaterial({
                uniforms: postprocessing.godrayMaskUniforms,
                vertexShader: godraysMaskShader.vertexShader,
                fragmentShader: godraysMaskShader.fragmentShader
            });

            const godraysGenShader = GodRaysGenerateShader;
            postprocessing.godrayGenUniforms = THREE.UniformsUtils.clone(godraysGenShader.uniforms);
            postprocessing.materialGodraysGenerate = new THREE.ShaderMaterial({
                uniforms: postprocessing.godrayGenUniforms,
                vertexShader: godraysGenShader.vertexShader,
                fragmentShader: godraysGenShader.fragmentShader
            });

            const godraysCombineShader = GodRaysCombineShader;
            postprocessing.godrayCombineUniforms = THREE.UniformsUtils.clone(godraysCombineShader.uniforms);
            postprocessing.materialGodraysCombine = new THREE.ShaderMaterial({
                uniforms: postprocessing.godrayCombineUniforms,
                vertexShader: godraysCombineShader.vertexShader,
                fragmentShader: godraysCombineShader.fragmentShader
            });

            const godraysFakeSunShader = GodRaysFakeSunShader;
            postprocessing.godraysFakeSunUniforms = THREE.UniformsUtils.clone(godraysFakeSunShader.uniforms);
            postprocessing.materialGodraysFakeSun = new THREE.ShaderMaterial({
                uniforms: postprocessing.godraysFakeSunUniforms,
                vertexShader: godraysFakeSunShader.vertexShader,
                fragmentShader: godraysFakeSunShader.fragmentShader
            });

            postprocessing.godraysFakeSunUniforms.bgColor.value.setHex(bgColor);
            postprocessing.godraysFakeSunUniforms.sunColor.value.setHex(sunColor);
            postprocessing.godrayCombineUniforms.fGodRayIntensity.value = 0.75;

            postprocessing.quad = new THREE.Mesh(
                new THREE.PlaneGeometry(1.0, 1.0),
                postprocessing.materialGodraysGenerate
            );
            postprocessing.quad.position.z = -9900;
            postprocessing.scene.add(postprocessing.quad);
        }

        function animate() {
            render();
        }

        function getStepSize(filterLen, tapsPerPass, pass) {
            return filterLen * Math.pow(tapsPerPass, -pass);
        }

        function filterGodRays(inputTex, renderTarget, stepSize) {
            postprocessing.scene.overrideMaterial = postprocessing.materialGodraysGenerate;
            postprocessing.godrayGenUniforms['fStepSize'].value = stepSize;
            postprocessing.godrayGenUniforms['tInput'].value = inputTex;
            renderer.setRenderTarget(renderTarget);
            renderer.render(postprocessing.scene, postprocessing.camera);
            postprocessing.scene.overrideMaterial = null;
        }

        function render() {
            const time = Date.now() / 4000;
            sphereMesh.position.x = orbitRadius * Math.cos(time);
            sphereMesh.position.z = orbitRadius * Math.sin(time) - 100;

            if (postprocessing.enabled) {
                clipPosition.x = sunPosition.x;
                clipPosition.y = sunPosition.y;
                clipPosition.z = sunPosition.z;
                clipPosition.w = 1;
                clipPosition.applyMatrix4(camera.matrixWorldInverse).applyMatrix4(camera.projectionMatrix);
                clipPosition.x /= clipPosition.w;
                clipPosition.y /= clipPosition.w;
                screenSpacePosition.x = (clipPosition.x + 1) / 2;
                screenSpacePosition.y = (clipPosition.y + 1) / 2;
                screenSpacePosition.z = clipPosition.z;

                postprocessing.godrayGenUniforms['vSunPositionScreenSpace'].value.copy(screenSpacePosition);
                postprocessing.godraysFakeSunUniforms['vSunPositionScreenSpace'].value.copy(screenSpacePosition);

                renderer.setRenderTarget(postprocessing.rtTextureColors);
                renderer.clear(true, true, false);

                const sunsqH = 0.74 * window.innerHeight;
                const sunsqW = 0.74 * window.innerHeight;
                screenSpacePosition.x *= window.innerWidth;
                screenSpacePosition.y *= window.innerHeight;
                renderer.setScissor(screenSpacePosition.x - sunsqW / 2, screenSpacePosition.y - sunsqH / 2, sunsqW, sunsqH);
                renderer.setScissorTest(true);
                postprocessing.godraysFakeSunUniforms['fAspect'].value = window.innerWidth / window.innerHeight;
                postprocessing.scene.overrideMaterial = postprocessing.materialGodraysFakeSun;
                renderer.setRenderTarget(postprocessing.rtTextureColors);
                renderer.render(postprocessing.scene, postprocessing.camera);
                renderer.setScissorTest(false);

                scene.overrideMaterial = null;
                renderer.setRenderTarget(postprocessing.rtTextureColors);
                renderer.render(scene, camera);

                scene.overrideMaterial = materialDepth;
                renderer.setRenderTarget(postprocessing.rtTextureDepth);
                renderer.clear();
                renderer.render(scene, camera);

                postprocessing.godrayMaskUniforms['tInput'].value = postprocessing.rtTextureDepth.texture;
                postprocessing.scene.overrideMaterial = postprocessing.materialGodraysDepthMask;
                renderer.setRenderTarget(postprocessing.rtTextureDepthMask);
                renderer.render(postprocessing.scene, postprocessing.camera);

                const filterLen = 1.0;
                const TAPS_PER_PASS = 6.0;
                filterGodRays(postprocessing.rtTextureDepthMask.texture, postprocessing.rtTextureGodRays2, getStepSize(filterLen, TAPS_PER_PASS, 1.0));
                filterGodRays(postprocessing.rtTextureGodRays2.texture, postprocessing.rtTextureGodRays1, getStepSize(filterLen, TAPS_PER_PASS, 2.0));
                filterGodRays(postprocessing.rtTextureGodRays1.texture, postprocessing.rtTextureGodRays2, getStepSize(filterLen, TAPS_PER_PASS, 3.0));

                postprocessing.godrayCombineUniforms['tColors'].value = postprocessing.rtTextureColors.texture;
                postprocessing.godrayCombineUniforms['tGodRays'].value = postprocessing.rtTextureGodRays2.texture;
                postprocessing.scene.overrideMaterial = postprocessing.materialGodraysCombine;
                renderer.setRenderTarget(null);
                renderer.render(postprocessing.scene, postprocessing.camera);
                postprocessing.scene.overrideMaterial = null;
            } else {
                renderer.setRenderTarget(null);
                renderer.clear();
                renderer.render(scene, camera);
            }
        }
    </script>

    <script>
    // --- TORCH EFFECT SCRIPT ---
    document.addEventListener("DOMContentLoaded", (event) => {
        const torch = document.getElementById('torch-overlay');

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.body.classList.add('touch-device');
        } else {
            const torchPos = { x: window.innerWidth / 2, y: window.innerHeight / 2 };

            window.addEventListener('mousemove', (e) => {
            gsap.to(torchPos, { duration: 0.6, x: e.clientX, y: e.clientY, ease: "power2.out" });
            });

            gsap.ticker.add(() => {
            torch.style.setProperty('--torch-x', `${torchPos.x}px`);
            torch.style.setProperty('--torch-y', `${torchPos.y}px`);
            });

            gsap.to(torch, {
            '--torch-size': '200px', duration: 4, ease: "sine.inOut", repeat: -1, yoyo: true
            });

            gsap.to(torch, {
                '--torch-brightness': 0.35,
                duration: 0.2,
                ease: "rough({ template: none.out, strength: 2, points: 25, taper: 'out', randomize: true, clamp: false})",
                repeat: -1,
                yoyo: true
            });

            gsap.to(torch, {
            '--torch-flicker-opacity': 0.2,
            duration: 0.1,
            ease: "rough({ template: none.out, strength: 1.5, points: 30, taper: 'none', randomize: true, clamp: false})",
            repeat: -1,
            yoyo: true
            });
        }
    });


    // --- RUNE PUZZLE SCRIPT ---
    window.onload = function() {

        (function() {
            const matrixCanvas = document.getElementById("matrix-canvas");
            if (!matrixCanvas) return;
            const matrixCntxt = matrixCanvas.getContext("2d");

            const matrixChars = ["♃","∂","ζ","♆","≋","𝛙","⟰","☀","☽","♅","⫷", "𝞝","☳","Σ","Ϡ","Ϛ", "Δ","ځ","گ",
                                'ᚲ', 'ᛟ', 'ᚱ', 'ᛖ', 'ᚨ', 'ᛒ', 'ᛞ', 'ᛇ', 'ᚠ', 'ᚷ', 'ᚺ', 'ᛁ', 'ᛃ', 'ᛚ', 'ᛗ'];
            const fontSize = 18;
            let drops = [];

            function resizeMatrixCanvas() {
                matrixCanvas.width = window.innerWidth;
                matrixCanvas.height = window.innerHeight;

                const rows = Math.floor(matrixCanvas.height / fontSize);
                drops = [];
                for (let y = 0; y < rows; y++) {
                    drops[y] = Math.floor(Math.random() * (matrixCanvas.width / fontSize));
                }
            }

            window.addEventListener('resize', resizeMatrixCanvas);
            resizeMatrixCanvas();

            function drawMatrix() {
                matrixCntxt.fillStyle = "rgba(10, 10, 31, 0.08)";
                matrixCntxt.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

                matrixCntxt.fillStyle = "var(--orrery-accent-color)";
                matrixCntxt.font = fontSize + "px 'Noto Sans Runic'";

                for (let i = 0; i < drops.length; i++) {
                    const txt = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                    matrixCntxt.fillText(txt, drops[i] * fontSize, i * fontSize);

                    if (drops[i] * fontSize > matrixCanvas.width && Math.random() > 0.98) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            setInterval(drawMatrix, 50);
        })();

        const orreryContainer = document.getElementById('orrery-container');
        const orreryHeart = document.getElementById('orrery-heart');
        const secretMessageDisplay = document.getElementById('secret-message-display');
        const energyLinesSVG = document.getElementById('orrery-energy-lines-svg');
        const svgNS = "http://www.w3.org/2000/svg";

        const ancientWord = "ᚲᛟᚱᛖ";
        const correctLetterOrder = ancientWord.split('');
        const secretMessageText = "ᚲᛟᚱᛖ";

        const allGlyphChars = [
            'ᚲ', 'ᛟ', 'ᚱ', 'ᛖ',
            'ᚨ', 'ᛒ', 'ᛞ', 'ᛇ', 'ᚠ', 'ᚷ', 'ᚺ', 'ᛁ', 'ᛃ', 'ᚲ', 'ᛚ', 'ᛗ',
            'ᚾ', 'ᛈ', 'ᚱ', 'ᛊ', 'ᛏ', 'ᚢ', 'ᚹ', 'ᛉ', 'ᚦ', 'ᛋ', 'ᛦ', 'ᛪ'
        ];

        const draggableGlyphs = [];
        const constellationSockets = [];
        let draggingGlyph = null;
        let offsetX, offsetY;
        let placedGlyphCount = 0;
        const socketRadiusPercentage = 33;
        const socketPositions = [];

        correctLetterOrder.forEach((letterChar, index) => {
            const angle = (index / correctLetterOrder.length) * 2 * Math.PI - (Math.PI / 2);
            const xPercent = 50 + socketRadiusPercentage * Math.cos(angle);
            const yPercent = 50 + socketRadiusPercentage * Math.sin(angle);

            const socket = document.createElement('div');
            socket.classList.add('constellation-socket');
            socket.style.left = `calc(${xPercent}% - 6vmin)`;
            socket.style.top = `calc(${yPercent}% - 6vmin)`;
            socket.dataset.expectedGlyph = letterChar;
            socket.dataset.index = index;

            const placeholder = document.createElement('span');
            placeholder.classList.add('socket-glyph-placeholder');
            placeholder.textContent = '✧';
            socket.appendChild(placeholder);

            orreryContainer.appendChild(socket);
            constellationSockets.push(socket);

            socketPositions[index] = { xPercent: xPercent, yPercent: yPercent, char: letterChar, element: socket };
        });

        const placedGlyphRects = [];
        const glyphBox = { width: 12, height: 12 };

        const shuffledGlyphs = [...allGlyphChars].sort(() => Math.random() - 0.5);
        shuffledGlyphs.forEach((glyphChar, i) => {
            const glyphEl = document.createElement('div');
            glyphEl.classList.add('starlight-glyph');
            glyphEl.textContent = glyphChar;
            glyphEl.dataset.glyphChar = glyphChar;

            const isTarget = correctLetterOrder.includes(glyphChar);
            glyphEl.dataset.isTarget = isTarget;
            if (!isTarget) {
                glyphEl.classList.add('decoy');
            }

            let rX, rY, newRect;
            let attempts = 0;
            let isOverlappingFlag;
            let isTooCloseToCenter;

            do {
                rX = Math.random() * (100 - glyphBox.width);
                rY = Math.random() * (100 - glyphBox.height);

                newRect = { x: rX, y: rY, width: glyphBox.width, height: glyphBox.height };

                const boxCenterX = rX + glyphBox.width / 2;
                const boxCenterY = rY + glyphBox.height / 2;
                isTooCloseToCenter = Math.sqrt(Math.pow(boxCenterX - 50, 2) + Math.pow(boxCenterY - 50, 2)) < 45;

                isOverlappingFlag = false;
                for (const placedRect of placedGlyphRects) {
                    if (
                        newRect.x < placedRect.x + placedRect.width &&
                        newRect.x + newRect.width > placedRect.x &&
                        newRect.y < placedRect.y + placedRect.height &&
                        newRect.y + newRect.height > placedRect.y
                    ) {
                        isOverlappingFlag = true;
                        break;
                    }
                }

                attempts++;
                if (attempts > 200) {
                    console.warn("Could not place a glyph without overlap after 200 attempts.");
                    break;
                }

            } while (isTooCloseToCenter || isOverlappingFlag);

            placedGlyphRects.push(newRect);

            glyphEl.style.left = `${rX}vw`;
            glyphEl.style.top = `${rY}vh`;
            glyphEl.style.animationDelay = `-${i * 0.6}s`;

            document.body.appendChild(glyphEl);
            draggableGlyphs.push(glyphEl);

            glyphEl.addEventListener('mousedown', handleDragStart);
            glyphEl.addEventListener('touchstart', handleDragStart, { passive: false });
        });

        function handleDragStart(e) {
            const targetGlyph = e.target.closest('.starlight-glyph');
            if (!targetGlyph || targetGlyph.classList.contains('locked')) return;

            draggingGlyph = targetGlyph;
            draggingGlyph.classList.add('dragging');

            const rect = draggingGlyph.getBoundingClientRect();
            let clientX, clientY;

            if (e.type === 'touchstart') {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
            e.preventDefault();
        }

        document.addEventListener('mousemove', handleDragMove);
        document.addEventListener('touchmove', handleDragMove, { passive: false });

        function handleDragMove(e) {
            if (draggingGlyph) {
                e.preventDefault();

                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                let newX = clientX - offsetX;
                let newY = clientY - offsetY;

                newX = Math.max(0, Math.min(newX, window.innerWidth - draggingGlyph.offsetWidth));
                newY = Math.max(0, Math.min(newY, window.innerHeight - draggingGlyph.offsetHeight));

                draggingGlyph.style.left = `${newX}px`;
                draggingGlyph.style.top = `${newY}px`;

                constellationSockets.forEach(s => {
                    if (!s.querySelector('.starlight-glyph.locked')) {
                        const isCorrectGlyphForSocket = s.dataset.expectedGlyph === draggingGlyph.dataset.glyphChar;
                        s.classList.toggle('resonating', isOverElement(draggingGlyph, s) && isCorrectGlyphForSocket);
                    }
                });
            }
        }

        document.addEventListener('mouseup', handleDragEnd);
        document.addEventListener('touchend', handleDragEnd);

        function handleDragEnd(e) {
            if (draggingGlyph) {
                let droppedCorrectly = false;
                constellationSockets.forEach(socket => {
                    socket.classList.remove('resonating');
                    if (isOverElement(draggingGlyph, socket) &&
                        socket.dataset.expectedGlyph === draggingGlyph.dataset.glyphChar &&
                        draggingGlyph.dataset.isTarget === 'true' &&
                        !socket.querySelector('.starlight-glyph.locked')) {

                        socket.appendChild(draggingGlyph);
                        draggingGlyph.classList.add('locked');
                        draggingGlyph.classList.remove('dragging');
                        draggingGlyph.style.left = '';
                        draggingGlyph.style.top = '';

                        socket.classList.add('filled');
                        placedGlyphCount++;
                        droppedCorrectly = true;

                        drawSigilSegment(socket);

                        if (placedGlyphCount === correctLetterOrder.length) {
                            triggerFullAwakening();
                        }
                    } else if (isOverElement(draggingGlyph, socket)) {
                        socket.classList.add('rejecting');
                        draggingGlyph.classList.add('rejected-glyph');
                        setTimeout(() => {
                            socket.classList.remove('rejecting');
                            if (draggingGlyph) draggingGlyph.classList.remove('rejected-glyph');
                        }, 500);
                    }
                });

                if (!droppedCorrectly) {
                    if (draggingGlyph && !draggingGlyph.classList.contains('rejected-glyph')) {
                        draggingGlyph.classList.remove('dragging');
                    }
                }
                if(draggingGlyph) draggingGlyph.classList.remove('dragging');
                draggingGlyph = null;
            }
        }


        function isOverElement(element1, element2) {
            const rect1 = element1.getBoundingClientRect();
            const rect2 = element2.getBoundingClientRect();
            return !(rect1.right < rect2.left ||
                     rect1.left > rect2.right ||
                     rect1.bottom < rect2.top ||
                     rect1.top > rect2.bottom);
        }

        function getSvgPixelCoords(percentage, svgDimension) {
            return (percentage / 100) * svgDimension;
        }

        function getSocketPixelPos(socketIndex, svgWidth, svgHeight) {
            const posData = socketPositions[socketIndex];
            return {
                x: getSvgPixelCoords(posData.xPercent, svgWidth),
                y: getSvgPixelCoords(posData.yPercent, svgHeight)
            };
        }

        function createTracerElement(x, y, delay = 0, duration = 0.7, targetPathElement) {
            const tracer = document.createElementNS(svgNS, "circle");
            tracer.setAttribute('class', 'line-tracer');
            tracer.setAttribute('cx', x);
            tracer.setAttribute('cy', y);

            const pathAnimation = document.createElementNS(svgNS, "animateMotion");
            pathAnimation.setAttribute('dur', `${duration}s`);
            pathAnimation.setAttribute('begin', `${delay}s`);
            pathAnimation.setAttribute('fill', 'freeze');

            const mpath = document.createElementNS(svgNS,"mpath");
            mpath.setAttributeNS("http://www.w3.org/1999/xlink", "xlink:href", `#${targetPathElement.id}`);
            pathAnimation.appendChild(mpath);

            tracer.appendChild(pathAnimation);
            energyLinesSVG.appendChild(tracer);

            setTimeout(() => {
                targetPathElement.classList.add('visible');
                if (tracer.parentNode) {
                    tracer.remove();
                }
            }, (delay + duration) * 1000);
        }

        let pathIdCounter = 0;
        function createPathElement(d, delay = 0, cssClass = 'orrery-energy-line') {
            const path = document.createElementNS(svgNS, "path");
            path.setAttribute('class', cssClass);
            path.setAttribute('d', d);
            path.setAttribute('fill', 'none');
            path.id = `sigilPath${pathIdCounter++}`;
            energyLinesSVG.appendChild(path);
            return path;
        }

        function createAnimatedCircle(cx, cy, r, delay = 0, duration = 1.5, cssClass = 'drawing-circle') {
            const circlePathD = `M ${cx - r} ${cy} A ${r} ${r} 0 1 1 ${cx + r} ${cy} A ${r} ${r} 0 1 1 ${cx - r} ${cy} Z`;
            const pathForTracer = createPathElement(circlePathD, delay, cssClass);

            createTracerElement(cx - r, cy, delay, duration, pathForTracer);
            return pathForTracer;
        }


        function drawSigilSegment(currentSocket) {
            const svgWidth = energyLinesSVG.clientWidth;
            const svgHeight = energyLinesSVG.clientHeight;

            const currentSocketIndex = parseInt(currentSocket.dataset.index);
            const currentP = getSocketPixelPos(currentSocketIndex, svgWidth, svgHeight);

            const heartX = getSvgPixelCoords(50, svgWidth);
            const heartY = getSvgPixelCoords(50, svgHeight);

            const pathHeartToSocket = createPathElement(`M ${heartX} ${heartY} L ${currentP.x} ${currentP.y}`, 0);
            createTracerElement(heartX, heartY, 0, 0.7, pathHeartToSocket);

            if (currentSocketIndex > 0) {
                const prevSocketIndex = currentSocketIndex - 1;
                if (constellationSockets[prevSocketIndex] && constellationSockets[prevSocketIndex].classList.contains('filled')) {
                    const prevP = getSocketPixelPos(prevSocketIndex, svgWidth, svgHeight);
                    const pathSocketToSocket = createPathElement(`M ${prevP.x} ${prevP.y} L ${currentP.x} ${currentP.y}`, 0.2);
                    createTracerElement(prevP.x, prevP.y, 0.2, 0.7, pathSocketToSocket);
                }
            }
        }


        function triggerFullAwakening() {
            orreryHeart.classList.add('active');
            secretMessageDisplay.textContent = secretMessageText;
            secretMessageDisplay.classList.add('visible');

            const svgWidth = energyLinesSVG.clientWidth;
            const svgHeight = energyLinesSVG.clientHeight;
            const heartX = getSvgPixelCoords(50, svgWidth);
            const heartY = getSvgPixelCoords(50, svgHeight);

            const p = correctLetterOrder.map((char, index) => getSocketPixelPos(index, svgWidth, svgHeight));

            let delay = 0.5;
            let path;

            path = createPathElement(`M ${p[3].x} ${p[3].y} L ${p[0].x} ${p[0].y}`, delay);
            createTracerElement(p[3].x, p[3].y, delay, 0.7, path);
            delay += 0.7;

            path = createPathElement(`M ${p[0].x} ${p[0].y} L ${p[2].x} ${p[2].y}`, delay);
            createTracerElement(p[0].x, p[0].y, delay, 0.7, path);
            delay += 0.7;
            path = createPathElement(`M ${p[1].x} ${p[1].y} L ${p[3].x} ${p[3].y}`, delay);
            createTracerElement(p[1].x, p[1].y, delay, 0.7, path);
            delay += 0.7;

            const midpointsHeartToSocket = p.map(socketPos => ({
                x: (heartX + socketPos.x) / 2,
                y: (heartY + socketPos.y) / 2
            }));
            for(let i = 0; i < midpointsHeartToSocket.length; i++) {
                const next_i = (i + 1) % midpointsHeartToSocket.length;
                path = createPathElement(`M ${midpointsHeartToSocket[i].x} ${midpointsHeartToSocket[i].y} L ${midpointsHeartToSocket[next_i].x} ${midpointsHeartToSocket[next_i].y}`, delay);
                createTracerElement(midpointsHeartToSocket[i].x, midpointsHeartToSocket[i].y, delay, 0.5, path);
                delay += 0.5;
            }

            const outerCircleRadius = Math.sqrt(Math.pow(p[0].x - heartX, 2) + Math.pow(p[0].y - heartY, 2)) + getSvgPixelCoords(5, Math.min(svgWidth, svgHeight));
            createAnimatedCircle(heartX, heartY, outerCircleRadius, delay, 1.5, 'drawing-circle outer-circle');
            delay += 1.5;

            const radiantLength = getSvgPixelCoords(5, Math.min(svgWidth, svgHeight));
            p.forEach((socketPos, index) => {
                const angleToSocket = Math.atan2(socketPos.y - heartY, socketPos.x - heartX);
                for (let i = -1; i <= 1; i++) {
                    const radiantAngle = angleToSocket + (i * Math.PI / 6);
                    const endX = socketPos.x + radiantLength * Math.cos(radiantAngle);
                    const endY = socketPos.y + radiantLength * Math.sin(radiantAngle);
                    path = createPathElement(`M ${socketPos.x} ${socketPos.y} L ${endX} ${endY}`, delay + index * 0.1 + i * 0.05, 'orrery-energy-line socket-radiant');
                    createTracerElement(socketPos.x, socketPos.y, delay + index * 0.1 + i * 0.05, 0.4, path);
                }
            });
            delay += 0.4 * 3 * p.length;

            const midpointsPerimeter = [];
            for(let i=0; i < p.length; i++) {
                const next_i = (i + 1) % p.length;
                midpointsPerimeter.push({
                    x: (p[i].x + p[next_i].x) / 2,
                    y: (p[i].y + p[next_i].y) / 2
                });
            }
            midpointsPerimeter.forEach((midP, index) => {
                path = createPathElement(`M ${heartX} ${heartY} L ${midP.x} ${midP.y}`, delay + index * 0.2);
                createTracerElement(heartX, heartY, delay + index * 0.2, 0.6, path);
            });

            draggableGlyphs.forEach(g => {
                g.style.pointerEvents = 'none';
                if (!g.classList.contains('locked')) {
                    g.style.opacity = '0.1';
                    g.style.animation = 'none';
                    g.style.transform = 'scale(0.5)';
                }
            });

            setTimeout(() => {
                window.location.href = '../core_truths_book/index.html';
            }, (delay + 2) * 1000);
        }
    };
